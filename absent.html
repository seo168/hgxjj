<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus | Absent Record</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0; --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    
    /* Stats Grid - Identical to Overview */
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); min-height: 260px; overflow: hidden; }
    .chart-box { width: 85px; height: 85px; margin: 0 auto 15px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.85rem; }
    .dept-title { font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
    .stat-list { display: flex; flex-direction: column; gap: 5px; padding-top: 10px; border-top: 1px solid #f1f5f9; overflow: hidden; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; font-size: 0.65rem; font-weight: 700; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .count-badge { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; min-width: 25px; text-align: center; }

    /* Navigation Menu */
    .nav-menu { display: flex; gap: 12px; margin-bottom: 1.5rem; padding: 10px; background: white; border-radius: 20px; border: 1px solid var(--border); }
    .menu-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); cursor: pointer; text-decoration: none; background: #f8fafc; transition: 0.3s; }
    .menu-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }

    /* Table */
    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    .tag-absent { background: #fee2e2; color: #b91c1c; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900;"><i class="fas fa-layer-group"></i> NEXUS v6.8</div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card">
      <div style="color:var(--withdraw)" class="dept-title">出款部汇总</div>
      <div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div>
      <div class="stat-list" id="list_cWD"></div>
    </div>
    <div class="dept-card">
      <div style="color:var(--cs)" class="dept-title">客服部汇总</div>
      <div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div>
      <div class="stat-list" id="list_cCS"></div>
    </div>
    <div class="dept-card">
      <div style="color:var(--finance)" class="dept-title">财务部汇总</div>
      <div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div>
      <div class="stat-list" id="list_cFN"></div>
    </div>
    <div class="dept-card">
      <div style="color:var(--country)" class="dept-title">国家汇总</div>
      <div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div>
      <div class="stat-list" id="list_cGEO"></div>
    </div>
    <div class="dept-card">
      <div style="color:var(--accent)" class="dept-title">班次汇总</div>
      <div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div>
      <div class="stat-list" id="list_cSH"></div>
    </div>
  </div>

  <div class="nav-menu">
    <a href="index.html" class="menu-btn"><i class="fas fa-th-large"></i> OVERVIEW</a>
    <a href="performance.html" class="menu-btn"><i class="fas fa-chart-line"></i> PERFORMANCE</a>
    <a href="#" class="menu-btn active"><i class="fas fa-user-clock"></i> ABSENT RECORD</a>
    <a href="salary.html" class="menu-btn"><i class="fas fa-wallet"></i> SALARY SLIP</a>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr><th>DATE</th><th>ID</th><th>NAME</th><th>DEPT</th><th>TYPE</th><th>REASON</th><th>STATUS</th></tr>
      </thead>
      <tbody>
        <tr><td>31-03-2026</td><td>#WD283</td><td>Angelica G. Milaran</td><td>出款</td><td><span class="tag-absent">SICK</span></td><td>Fever</td><td>APPROVED</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = [], charts = {};
  const palette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];

  async function load() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      db = t.split(/\r?\n/).slice(1).map(l => l.split(',').map(c => c.trim())).filter(d => d[3]);
      syncCharts();
      setInterval(() => {
        document.getElementById('clock').innerText = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})).toLocaleTimeString('en-GB') + " AMT";
      }, 1000);
    } catch (e) { console.error(e); }
  }

  function syncCharts() {
    let datasets = { cWD: {}, cCS: {}, cFN: {}, cGEO: {}, cSH: {} };
    db.forEach(r => {
      const b = r[1]||"", j = r[9]||"";
      if (b.includes('出款') || j.includes('出款')) datasets.cWD[b] = (datasets.cWD[b]||0)+1;
      else if (b.includes('客服') || j.includes('客服')) datasets.cCS[b] = (datasets.cCS[b]||0)+1;
      else if (b.includes('财务') || j.includes('财务')) datasets.cFN[b] = (datasets.cFN[b]||0)+1;
      if(r[8]) datasets.cGEO[r[8]] = (datasets.cGEO[r[8]]||0)+1;
      if(r[5]) datasets.cSH[r[5]] = (datasets.cSH[r[5]]||0)+1;
    });
    Object.keys(datasets).forEach(id => {
      const ctx = document.getElementById(id).getContext('2d');
      const entries = Object.entries(datasets[id]).sort((a,b)=>b[1]-a[1]);
      const dataValues = entries.map(e => e[1]);
      const colors = entries.map((_, i) => palette[i % palette.length]);
      charts[id] = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: dataValues, backgroundColor: colors, borderWidth: 0 }] }, options: { plugins: { legend: { display: false } }, cutout: '75%', animation: false } });
      document.getElementById('t' + id.slice(1)).innerText = dataValues.reduce((a, b) => a + b, 0);
      const listEl = document.getElementById('list_' + id);
      listEl.innerHTML = entries.slice(0, 4).map(([n, v], i) => `<div class="stat-row"><div class="indicator"><span class="dot" style="background:${colors[i]}"></span><span>${n}</span></div><span class="count-badge">${v}</span></div>`).join('');
    });
  }
  load();
</script>
</body>
</html>
