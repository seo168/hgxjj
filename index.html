<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Master v4.0 | Fixed Layout & Pagination</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); text-align: center; overflow-x: hidden; }
    
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    
    /* Stats Grid Tetap Rapi */
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); min-height: 250px; }
    
    .chart-box { width: 85px; height: 85px; margin: 0 auto 10px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.8rem; }
    
    .stat-list { max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    .stat-row { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; font-weight: 700; width: 100%; }

    /* --- TABEL FIXED LAYOUT --- */
    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .table-header { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    
    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1200px; } /* table-layout: fixed adalah kunci rapi */
    
    th { background: #f8fafc; padding: 1.2rem 0.5rem; text-align: center; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    
    td { 
      padding: 0.8rem 0.5rem; 
      border-bottom: 1px solid var(--border); 
      font-size: 0.8rem; 
      font-weight: 600; 
      text-align: center; 
      vertical-align: middle;
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; /* Jika teks kepanjangan akan jadi ... */
      height: 60px; /* Mengunci tinggi baris agar tidak melompat */
    }

    /* Mengunci Lebar Kolom agar tidak bergeser saat ganti page */
    th:nth-child(1), td:nth-child(1) { width: 10%; } /* Platform */
    th:nth-child(2), td:nth-child(2) { width: 12%; } /* Dept */
    th:nth-child(3), td:nth-child(3) { width: 15%; } /* Bagian */
    th:nth-child(4), td:nth-child(4) { width: 10%; } /* ID */
    th:nth-child(5), td:nth-child(5) { width: 18%; } /* Nama */
    th:nth-child(6), td:nth-child(6) { width: 10%; } /* Shift */
    th:nth-child(7), td:nth-child(7) { width: 15%; } /* Tgl Masuk */
    th:nth-child(8), td:nth-child(8) { width: 10%; } /* Negara */

    /* Tags & Date Style */
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 6px; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 4px 10px; border-radius: 6px; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 4px 10px; border-radius: 6px; }
    .strict-date { background: #f1f5f9; color: #334155; padding: 5px 10px; border-radius: 6px; font-family: monospace; font-weight: 800; font-size: 0.75rem; border: 1px solid #e2e8f0; }

    .pagination-bar { padding: 1rem; background: #fff; display: flex; justify-content: center; align-items: center; gap: 20px; border-top: 1px solid var(--border); }
    .page-btn { padding: 10px 20px; border: 1px solid var(--border); background: white; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .page-btn:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900; color: var(--primary); font-size: 1.1rem;"><i class="fas fa-th-list" style="color:var(--accent)"></i> NEXUS<span>FIXED v4.0</span></div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid" id="statsGrid">
    <div class="dept-card"><div class="dept-title" style="color:var(--withdraw)">Withdraw</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div><div class="stat-list" id="lWD"></div></div>
    <div class="dept-card"><div class="dept-title" style="color:var(--cs)">Service</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div><div class="stat-list" id="lCS"></div></div>
    <div class="dept-card"><div class="dept-title" style="color:var(--finance)">Finance</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div><div class="stat-list" id="lFN"></div></div>
    <div class="dept-card"><div class="dept-title" style="color:var(--country)">Country</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div><div class="stat-list" id="lGEO"></div></div>
    <div class="dept-card"><div class="dept-title" style="color:var(--accent)">Shifts</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div><div class="stat-list" id="lSH"></div></div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <h3 style="font-weight: 800; font-size: 0.9rem;">Staff Database</h3>
      <input type="text" id="search" class="search-input" placeholder="Quick Search...">
    </div>
    
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Platform</th><th>Dept</th><th>Bagian</th><th>ID</th><th>Nama</th><th>Shift</th><th>Tgl Masuk</th><th>Negara</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    
    <div class="pagination-bar">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)"><i class="fas fa-arrow-left"></i> PREV</button>
      <span id="pageNumber" style="font-size: 0.8rem; font-weight: 800; min-width: 120px;">PAGE 1 OF 1</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT <i class="fas fa-arrow-right"></i></button>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = []; let filtered = []; let charts = {};
  let currentPage = 1; const rowsPerPage = 10;

  function superFormatDate(val) {
    if (!val || val.trim() === "" || val === "-") return "-";
    let d = (!isNaN(val) && val.length >= 5) ? new Date((val - 25569) * 86400 * 1000) : new Date(val.replace(/-/g, '/'));
    return !isNaN(d.getTime()) ? `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth()+1).padStart(2, '0')}-${d.getFullYear()}` : val;
  }

  async function load() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      db = t.split(/\r?\n/).slice(1).map(l => l.split(',').map(c => c.trim())).filter(d => d[3]);
      filtered = [...db];
      setInterval(() => {
        const amt = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"}));
        document.getElementById('clock').innerText = amt.toLocaleTimeString('en-GB') + " AMT";
      }, 1000);
      syncCharts(); renderTable();
    } catch (e) { console.error(e); }
  }

  function syncCharts() {
    let wdO = {}, csO = {}, fnO = {}, geO = {}, shO = { Day: 0, Night: 0, Mid: 0 };
    db.forEach(r => {
      const dept = (r[1]||'').toLowerCase(); const sub = (r[9]||'Unassigned');
      const shift = (r[5]||'').toLowerCase(); const geo = (r[8]||'Unknown');
      if (shift.includes('day')) shO.Day++; else if (shift.includes('night')) shO.Night++; else if (shift.includes('mid')) shO.Mid++;
      if (dept.includes('出款') || sub.includes('出款')) { wdO[sub] = (wdO[sub] || 0) + 1; }
      else if (dept.includes('客服') || sub.includes('客服')) { csO[sub] = (csO[sub] || 0) + 1; }
      else if (dept.includes('财务') || sub.includes('财务')) { fnO[sub] = (fnO[sub] || 0) + 1; }
      geO[geo] = (geO[geo] || 0) + 1;
    });
    
    const draw = (id, data, colors) => {
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: colors, borderWidth: 0 }] },
        options: { plugins: { legend: { display: false } }, cutout: '78%', responsive: true }
      });
      const tId = 't' + id.substring(1);
      document.getElementById(tId).innerText = Object.values(data).reduce((a,b)=>a+b, 0);
      const lId = 'l' + id.substring(1);
      document.getElementById(lId).innerHTML = Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([n,c]) => 
        `<div class="stat-row"><span>${n}</span><span class="badge" style="background:${colors[0]}88; color:black; padding:1px 5px; border-radius:4px;">${c}</span></div>`).join('');
    };
    draw('cWD', wdO, ['#10b981']); draw('cCS', csO, ['#8b5cf6']); draw('cFN', fnO, ['#f59e0b']); draw('cGEO', geO, ['#f43f5e']); draw('cSH', shO, ['#2563eb']);
  }

  function renderTable() {
    const tbody = document.getElementById('tbody');
    const start = (currentPage - 1) * rowsPerPage;
    const pageData = filtered.slice(start, start + rowsPerPage);

    tbody.innerHTML = pageData.map(r => {
      let cls = (r[1].includes('出款') || r[9].includes('出款')) ? 'tag-wd' : (r[1].includes('客服') || r[9].includes('客服')) ? 'tag-cs' : (r[1].includes('财务') || r[9].includes('财务')) ? 'tag-fn' : '';
      return `<tr>
        <td><b style="color:var(--accent)">${r[0]}</b></td>
        <td><span class="${cls}">${r[1]}</span></td>
        <td>${r[9]||'-'}</td>
        <td style="opacity:0.5">#${r[2]}</td>
        <td style="font-weight:800">${r[3]}</td>
        <td style="color:${r[5].toLowerCase().includes('mid')?'var(--finance)':'inherit'}">${r[5]}</td>
        <td><span class="strict-date">${superFormatDate(r[6])}</span></td>
        <td style="color:var(--country)">${r[8]}</td>
      </tr>`;
    }).join('');

    const totalPages = Math.ceil(filtered.length / rowsPerPage);
    document.getElementById('pageNumber').innerText = `PAGE ${currentPage} OF ${totalPages || 1}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function changePage(dir) { currentPage += dir; renderTable(); window.scrollTo(0,0); }

  document.getElementById('search').addEventListener('input', (e) => {
    filtered = db.filter(r => r.some(c => c.toLowerCase().includes(e.target.value.toLowerCase())));
    currentPage = 1; renderTable();
  });

  load();
</script>
</body>
</html>
