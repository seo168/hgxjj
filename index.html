<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus v6.8 | Navigation System</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; }
    
    /* Skeleton Loading Effect */
    .loading-pulse { background: #e2e8f0; animation: pulse 1.5s infinite; border-radius: 10px; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); min-height: 260px; transition: transform 0.2s; }
    .dept-card:hover { transform: translateY(-3px); }
    .chart-box { width: 85px; height: 85px; margin: 0 auto 15px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.85rem; }
    .dept-title { font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 15px; text-transform: uppercase; }

    .nav-menu { display: flex; gap: 12px; margin-bottom: 1.5rem; padding: 10px; background: white; border-radius: 20px; border: 1px solid var(--border); }
    .menu-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.3s; background: #f8fafc; text-decoration: none; }
    .menu-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }

    .filter-wrapper { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 1rem; }
    .filter-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
    .filter-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
    .filter-group select, .filter-group input { width: 100%; padding: 11px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; outline: none; transition: border-color 0.2s; }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--accent); }

    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 3px 10px; border-radius: 6px; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 3px 10px; border-radius: 6px; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 3px 10px; border-radius: 6px; }
    
    .date-badge { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 0.75rem; font-weight: 700; }
    .pagination-bar { padding: 1.2rem; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 20px; }
    .page-btn { padding: 8px 20px; border: 1px solid var(--border); background: white; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
    .page-btn:hover:not(:disabled) { background: #f1f5f9; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .stat-list { display: flex; flex-direction: column; gap: 5px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; font-size: 0.65rem; font-weight: 700; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .count-badge { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; min-width: 25px; text-align: center; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900;"><i class="fas fa-layer-group"></i> NEXUS v6.8</div>
  <div class="amt-clock" id="clock">--:--:-- AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card"><div style="color:var(--withdraw)" class="dept-title">出款部汇总</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div><div class="stat-list" id="list_cWD"></div></div>
    <div class="dept-card"><div style="color:var(--cs)" class="dept-title">客服部汇总</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div><div class="stat-list" id="list_cCS"></div></div>
    <div class="dept-card"><div style="color:var(--finance)" class="dept-title">财务部汇总</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div><div class="stat-list" id="list_cFN"></div></div>
    <div class="dept-card"><div style="color:var(--country)" class="dept-title">国家汇总</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div><div class="stat-list" id="list_cGEO"></div></div>
    <div class="dept-card"><div style="color:var(--accent)" class="dept-title">班次汇总</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div><div class="stat-list" id="list_cSH"></div></div>
  </div>

  <div class="nav-menu">
    <a href="#" class="menu-btn active"><i class="fas fa-th-large"></i> OVERVIEW</a>
    <a href="performance.html" class="menu-btn"><i class="fas fa-chart-line"></i> PERFORMANCE</a>
    <a href="absent.html" class="menu-btn"><i class="fas fa-user-clock"></i> ABSENT RECORD</a>
    <a href="salary.html" class="menu-btn"><i class="fas fa-wallet"></i> SALARY SLIP</a>
  </div>

  <div class="filter-wrapper">
    <div class="filter-grid">
      <div class="filter-group"><label>Keyword</label><input type="text" id="searchName" placeholder="Search ID or Name..."></div>
      <div class="filter-group"><label>Shift</label><select id="fShift"></select></div>
      <div class="filter-group"><label>Team (J)</label><select id="fTeam"></select></div>
      <div class="filter-group"><label>Group (B)</label><select id="fGroup"></select></div>
      <div class="filter-group"><label>Country</label><select id="fCountry"></select></div>
      <div class="filter-group"><label>Platform</label><select id="fPlatform"></select></div>
    </div>
  </div>

  <div class="table-container">
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr><th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th></tr>
        </thead>
        <tbody id="tbody">
          </tbody>
      </table>
    </div>
    <div class="pagination-bar">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)">PREV</button>
      <span id="pageInfo" style="font-weight: 800; font-size: 0.8rem;">Page 1</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = [], filtered = [], charts = {};
  let currentPage = 1;
  const rowsPerPage = 12; // Sedikit lebih banyak untuk layar besar
  const palette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];

  // 1. Clock Instan
  function updateClock() {
    const now = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"}));
    document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB') + " AMT";
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 2. Load Data dengan Caching & Async Optimization
  async function load() {
    try {
      // Gunakan timestamp untuk bypass cache hanya jika diperlukan, 
      // tapi simpan di sessionStorage agar navigasi antar halaman instan.
      let dataText = sessionStorage.getItem('nexus_data');
      if (!dataText) {
        const response = await fetch(`${CSV_URL}&nocache=${Date.now()}`);
        dataText = await response.text();
        sessionStorage.setItem('nexus_data', dataText);
      }
      
      db = dataText.split(/\r?\n/).slice(1)
        .map(line => line.split(',').map(cell => cell.trim()))
        .filter(row => row.length > 3 && row[3] !== "");

      initFilters();
      runFilters(); 
    } catch (e) {
      console.error("Data Load Error:", e);
      document.getElementById('tbody').innerHTML = `<tr><td colspan="8">Failed to load data. Please refresh.</td></tr>`;
    }
  }

  function initFilters() {
    const getUnique = (idx) => [...new Set(db.map(r => r[idx]))].filter(v => v && v !== "-").sort();
    
    const fillSelect = (id, vals) => {
      const el = document.getElementById(id);
      if(!el) return;
      let html = '<option value="">All Records</option>';
      vals.forEach(v => html += `<option value="${v}">${v}</option>`);
      el.innerHTML = html;
    };

    fillSelect('fPlatform', getUnique(0));
    fillSelect('fGroup', getUnique(1));
    fillSelect('fTeam', getUnique(9));
    fillSelect('fShift', getUnique(5));
    fillSelect('fCountry', getUnique(8));

    // Debouncing filter agar tidak lag saat mengetik cepat
    let filterTimeout;
    ['searchName', 'fShift', 'fTeam', 'fGroup', 'fCountry', 'fPlatform'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        clearTimeout(filterTimeout);
        filterTimeout = setTimeout(() => {
          currentPage = 1;
          runFilters();
        }, 150); 
      });
    });
  }

  function runFilters() {
    const filters = {
      name: document.getElementById('searchName').value.toLowerCase(),
      shift: document.getElementById('fShift').value,
      team: document.getElementById('fTeam').value,
      group: document.getElementById('fGroup').value,
      country: document.getElementById('fCountry').value,
      platform: document.getElementById('fPlatform').value
    };

    filtered = db.filter(r => {
      return (!filters.name || r.join(' ').toLowerCase().includes(filters.name)) &&
             (!filters.shift || r[5] === filters.shift) &&
             (!filters.group || r[1] === filters.group) &&
             (!filters.team || r[9] === filters.team) &&
             (!filters.country || r[8] === filters.country) &&
             (!filters.platform || r[0] === filters.platform);
    });

    updateUI();
  }

  function formatDate(v) {
    if (!v || v === "-") return "-";
    let d = (!isNaN(v) && v.length > 4) ? new Date((v - 25569) * 86400 * 1000) : new Date(v.replace(/-/g, '/'));
    if (isNaN(d.getTime())) return v;
    return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
  }

  function updateUI() {
    // Render tabel
    const tbody = document.getElementById('tbody');
    const start = (currentPage - 1) * rowsPerPage;
    const pageData = filtered.slice(start, start + rowsPerPage);
    
    tbody.innerHTML = pageData.map(r => {
      const b = r[1]||"", j = r[9]||"";
      let cls = (b.includes('出款') || j.includes('出款')) ? 'tag-wd' : 
                (b.includes('客服') || j.includes('客服')) ? 'tag-cs' : 
                (b.includes('财务') || j.includes('财务')) ? 'tag-fn' : '';
      
      return `<tr>
        <td><b>${r[0]}</b></td>
        <td><span class="${cls}">${r[1]}</span></td>
        <td>${r[9]}</td>
        <td style="opacity:0.5">#${r[2]}</td>
        <td style="font-weight:800">${r[3]}</td>
        <td>${r[5]}</td>
        <td><span class="date-badge">${formatDate(r[6])}</span></td>
        <td style="color:var(--country)">${r[8]}</td>
      </tr>`;
    }).join('');

    // Update Pagination
    const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
    document.getElementById('pageInfo').innerText = `Page ${currentPage} / ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;

    // Render Charts (Hanya update jika data berubah)
    syncCharts();
  }

  function changePage(step) {
    currentPage += step;
    updateUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function syncCharts() {
    let datasets = { cWD: {}, cCS: {}, cFN: {}, cGEO: {}, cSH: {} };
    
    // Hitung data (gunakan data yang sudah difilter atau total? Kita pakai filtered agar dinamis)
    filtered.forEach(r => {
      const b = r[1]||"", j = r[9]||"";
      if (b.includes('出款') || j.includes('出款')) datasets.cWD[b] = (datasets.cWD[b]||0)+1;
      else if (b.includes('客服') || j.includes('客服')) datasets.cCS[b] = (datasets.cCS[b]||0)+1;
      else if (b.includes('财务') || j.includes('财务')) datasets.cFN[b] = (datasets.cFN[b]||0)+1;
      if(r[8]) datasets.cGEO[r[8]] = (datasets.cGEO[r[8]]||0)+1;
      if(r[5]) datasets.cSH[r[5]] = (datasets.cSH[r[5]]||0)+1;
    });

    const chartConfig = {
      type: 'doughnut',
      options: { 
        cutout: '75%', 
        animation: { duration: 0 }, // Matikan animasi agar transisi filter instan/stabil
        plugins: { legend: { display: false } }
      }
    };

    Object.keys(datasets).forEach(id => {
      const canvas = document.getElementById(id);
      if (!canvas) return;
      
      const entries = Object.entries(datasets[id]).sort((a,b)=>b[1]-a[1]);
      const dataValues = entries.map(e => e[1]);
      const colors = entries.map((_, i) => palette[i % palette.length]);
      const total = dataValues.reduce((a, b) => a + b, 0);

      document.getElementById('t' + id.slice(1)).innerText = total;

      // Re-use chart instance untuk performa
      if (charts[id]) {
        charts[id].data.datasets[0].data = dataValues;
        charts[id].data.datasets[0].backgroundColor = colors;
        charts[id].update();
      } else {
        charts[id] = new Chart(canvas.getContext('2d'), {
          ...chartConfig,
          data: { datasets: [{ data: dataValues, backgroundColor: colors, borderWidth: 0 }] }
        });
      }

      // Update List bawah chart
      const listEl = document.getElementById('list_' + id);
      listEl.innerHTML = entries.slice(0, 4).map(([name, val], i) => `
        <div class="stat-row">
          <div class="indicator">
            <span class="dot" style="background:${colors[i]}"></span>
            <span>${name}</span>
          </div>
          <span class="count-badge">${val}</span>
        </div>`).join('');
    });
  }

  // Jalankan load
  document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
