<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Executive v2.9 | Unified Intelligence</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.1);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f1f5f9; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

    nav {
      position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
      padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .brand i { color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* Analytics Header */
    .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
    .stat-card { background: white; padding: 1.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    
    .chart-container { width: 100px; height: 100px; margin: 0 auto 1rem; position: relative; }
    .chart-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.8rem; }

    .stat-list { max-height: 120px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
    .stat-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 700; }
    .stat-item:last-child { border: none; }
    .val-pill { background: var(--primary); color: white; padding: 1px 8px; border-radius: 10px; font-size: 0.7rem; }

    /* Online Badge */
    .online-indicator { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; }
    .online-indicator i { font-size: 0.5rem; animation: pulse 1.5s infinite; }

    /* Table Styling */
    .table-section { margin-top: 2rem; background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; }
    .toolbar { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .search-input { padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border); width: 350px; outline: none; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; }

    .amt-time { background: var(--accent); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<nav>
  <div class="brand"><i class="fas fa-microchip"></i> NEXUS<span>CORE</span></div>
  <div class="amt-time" id="amtClock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="analytics-grid">
    <div class="stat-card">
      <div class="chart-container"><canvas id="shiftChart"></canvas><div class="chart-label" id="totalStaff">0</div></div>
      <h4 style="font-size:0.75rem; text-align:center; margin-bottom:10px;">SHIFT DISTRIBUTION</h4>
      <div class="stat-list" id="shiftList"></div>
    </div>

    <div class="stat-card">
      <div class="chart-container"><canvas id="jobChart"></canvas><div class="chart-label" id="totalOnline">0</div></div>
      <h4 style="font-size:0.75rem; text-align:center; margin-bottom:10px;">ONLINE BY JOB (AMT)</h4>
      <div class="stat-list" id="jobList"></div>
    </div>

    <div class="stat-card">
      <div class="chart-container"><canvas id="geoChart"></canvas></div>
      <h4 style="font-size:0.75rem; text-align:center; margin-bottom:10px;">COUNTRY DISTRIBUTION</h4>
      <div class="stat-list" id="geoList"></div>
    </div>
  </div>

  <div class="table-section">
    <div class="toolbar">
      <h3 style="font-weight: 800;">Staff Identity List</h3>
      <input type="text" id="masterSearch" class="search-input" placeholder="Quick search staff database...">
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Platform (盘口)</th>
            <th>Role (岗位)</th>
            <th style="width: 80px;">ID</th>
            <th style="width: 250px;">Name (姓名)</th>
            <th>Account (后台账号)</th>
            <th>Join Date (入职)</th>
            <th>Country (国家)</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div style="padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); background: #f8fafc;">
      <span id="pageInfo" style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted);">PAGE 1</span>
      <div style="display:flex; gap:10px;">
        <button onclick="changePage(-1)" id="prevBtn" style="padding:8px 16px; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-weight:800;">PREV</button>
        <button onclick="changePage(1)" id="nextBtn" style="padding:8px 16px; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-weight:800;">NEXT</button>
      </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  
  let raw = [];
  let filtered = [];
  let page = 1;
  const limit = 10;
  let charts = {};

  async function init() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      const lines = t.split(/\r?\n/).map(l => l.split(','));
      raw = lines.slice(1).filter(d => d.length > 5 && d[3] && d[3].trim() !== "");
      filtered = [...raw];
      
      setInterval(updateRealtime, 1000);
      updateRealtime();
      renderTable();
    } catch (e) { console.error(e); }
  }

  function getAMT() {
    return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"}));
  }

  function updateRealtime() {
    const amt = getAMT();
    const h = amt.getHours();
    const totalM = h * 60 + amt.getMinutes();
    document.getElementById('amtClock').innerText = amt.toLocaleTimeString('en-GB') + " AMT";

    let shifts = { day: 0, night: 0, mid: 0 };
    let onlineJobs = {};
    let countries = {};
    let totalOnline = 0;

    raw.forEach(r => {
      const s = (r[5] || '').toLowerCase().trim();
      const job = (r[1] || 'Unknown').trim();
      const geo = (r[8] || 'Unknown').trim();

      // Robust Shift Counting
      if (s.includes('day')) shifts.day++;
      else if (s.includes('night')) shifts.night++;
      else if (s.includes('mid')) shifts.mid++;

      // Online Logic
      let on = false;
      if(s.includes('day') && (h>=4 && h<16)) on = true;
      else if(s.includes('night') && (h>=16 || h<4)) on = true;
      else if(s.includes('mid') && (totalM >= 570 && totalM < 1290)) on = true;

      if(on) {
        totalOnline++;
        onlineJobs[job] = (onlineJobs[job] || 0) + 1;
      }

      countries[geo] = (countries[geo] || 0) + 1;
    });

    document.getElementById('totalStaff').innerText = raw.length;
    document.getElementById('totalOnline').innerText = totalOnline;

    // Update Visual Lists
    const listHtml = (obj, color) => Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([n,c]) => `
      <div class="stat-item"><span>${n}</span><span class="val-pill" style="background:${color}">${c}</span></div>
    `).join('');

    document.getElementById('shiftList').innerHTML = listHtml(shifts, 'var(--accent)');
    document.getElementById('jobList').innerHTML = listHtml(onlineJobs, 'var(--success)');
    document.getElementById('geoList').innerHTML = listHtml(countries, 'var(--warning)');

    // Sync Charts
    updateChart('shiftChart', shifts, ['#2563eb', '#0f172a', '#64748b']);
    updateChart('jobChart', onlineJobs, ['#10b981', '#34d399', '#059669']);
    updateChart('geoChart', countries, ['#f59e0b', '#fbbf24', '#d97706']);
  }

  function updateChart(id, dataObj, colors) {
    const ctx = document.getElementById(id).getContext('2d');
    const labels = Object.keys(dataObj);
    const values = Object.values(dataObj);

    if (charts[id]) {
      charts[id].data.labels = labels;
      charts[id].data.datasets[0].data = values;
      charts[id].update('none');
    } else {
      charts[id] = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }]
        },
        options: { plugins: { legend: { display: false } }, cutout: '80%', responsive: true }
      });
    }
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const start = (page - 1) * limit;
    const slice = filtered.slice(start, start + limit);

    tbody.innerHTML = slice.map(r => `
      <tr>
        <td><b style="color:var(--accent)">${r[0]}</b></td>
        <td>${r[1]}</td>
        <td style="opacity:0.5">#${r[2]}</td>
        <td style="font-weight:800; color:var(--primary)">${r[3]}</td>
        <td style="font-size:0.8rem; color:var(--text-muted)">${r[4]}</td>
        <td style="font-size:0.8rem">${r[6]}</td>
        <td><i class="fas fa-globe" style="font-size:0.7rem; color:var(--warning)"></i> ${r[8]}</td>
      </tr>
    `).join('');

    const totalPages = Math.ceil(filtered.length / limit);
    document.getElementById('pageInfo').innerText = `PAGE ${page} OF ${totalPages || 1} (${filtered.length} Staff)`;
    document.getElementById('prevBtn').disabled = page === 1;
    document.getElementById('nextBtn').disabled = page >= totalPages;
  }

  function changePage(d) { page += d; renderTable(); }

  document.getElementById('masterSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filtered = raw.filter(r => r.some(c => c.toLowerCase().includes(q)));
    page = 1;
    renderTable();
  });

  init();
</script>
</body>
</html>
