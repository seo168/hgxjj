<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus v6.8 | Professional Performance System</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.6; }
    
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 24px; border: 1px solid var(--border); min-height: 280px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .chart-box { width: 85px; height: 85px; margin: 0 auto 15px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.85rem; }
    .dept-title { font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }

    .nav-menu { display: flex; gap: 12px; margin-bottom: 1.5rem; padding: 10px; background: white; border-radius: 20px; border: 1px solid var(--border); }
    .menu-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.3s; background: #f8fafc; border: none; }
    .menu-btn.active { background: var(--primary); color: white; }

    .filter-wrapper { background: white; padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 1rem; }
    .filter-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
    .filter-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
    .filter-group select, .filter-group input { width: 100%; padding: 11px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; outline: none; }

    .table-container { background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th { background: #f8fafc; padding: 1.2rem 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    
    .id-link { background: #eff6ff; color: #2563eb; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; transition: 0.2s; display: inline-block; border:none; }
    .id-link:hover { background: var(--accent); color: white; transform: scale(1.05); }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 95%; max-width: 600px; border-radius: 32px; padding: 2.5rem; position: relative; }
    .perf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .perf-item { background: #f8fafc; padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
    .perf-item.highlight { background: var(--primary); border: none; }
    .perf-item.full { grid-column: span 2; }
    .perf-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
    .highlight .perf-label { color: rgba(255,255,255,0.6); }
    .perf-val { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .highlight .perf-val { color: white; }

    .stat-list { display: flex; flex-direction: column; gap: 8px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 8px; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900; font-size: 1.2rem;"><i class="fas fa-chart-pie"></i> NEXUS <span style="color:var(--accent)">v6.8</span></div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card"><div style="color:var(--withdraw)" class="dept-title">Withdrawal</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div><div class="stat-list" id="list_cWD"></div></div>
    <div class="dept-card"><div style="color:var(--cs)" class="dept-title">CS & Risk</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div><div class="stat-list" id="list_cCS"></div></div>
    <div class="dept-card"><div style="color:var(--finance)" class="dept-title">Finance</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div><div class="stat-list" id="list_cFN"></div></div>
    <div class="dept-card"><div style="color:var(--country)" class="dept-title">Country</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div><div class="stat-list" id="list_cGEO"></div></div>
    <div class="dept-card"><div style="color:var(--accent)" class="dept-title">Shift</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div><div class="stat-list" id="list_cSH"></div></div>
  </div>

  <div class="nav-menu">
    <button class="menu-btn active"><i class="fas fa-layer-group"></i> OVERVIEW</button>
    <button class="menu-btn"><i class="fas fa-chart-line"></i> PERFORMANCE</button>
  </div>

  <div class="filter-wrapper">
    <div class="filter-grid">
      <div class="filter-group"><label>Search Staff</label><input type="text" id="searchName" placeholder="Name or ID..."></div>
      <div class="filter-group"><label>Shift</label><select id="fShift"></select></div>
      <div class="filter-group"><label>Team</label><select id="fTeam"></select></div>
      <div class="filter-group"><label>Group</label><select id="fGroup"></select></div>
      <div class="filter-group"><label>Country</label><select id="fCountry"></select></div>
      <div class="filter-group"><label>Platform</label><select id="fPlatform"></select></div>
    </div>
  </div>

  <div class="table-container">
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr><th>Platform</th><th>Group</th><th>Team</th><th>ID</th><th>Name</th><th>Shift</th><th>Join Date</th><th>Country</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div style="margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1rem;">
      <h2 id="mName" style="font-weight:900;">Name</h2>
      <span id="mID" style="color:var(--accent); font-weight:800;">#ID</span>
    </div>
    <div class="perf-grid">
      <div class="perf-item highlight full"><div class="perf-label">MASA KERJA</div><div class="perf-val" id="mTenure">-</div></div>
      <div class="perf-item"><div class="perf-label">AVG HARIAN</div><div class="perf-val" id="mAvg">0</div></div>
      <div class="perf-item"><div class="perf-label">TOTAL ORDER</div><div class="perf-val" id="mTotal">0</div></div>
      <div class="perf-item full"><div class="perf-label">MENTOR</div><div class="perf-val" id="mMentor">-</div></div>
    </div>
  </div>
</div>

<script>
  // DUA LINK BERBEDA
  const URL_MASTER = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?gid=0&output=csv";
  const URL_PERF = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlA6btKuVajZNe2XPoc3b9BAhbeqFYzAS97f2f8mawUCB4-NOHXryGY_b-4WyZ_A/pub?gid=0&output=csv";

  let dbMaster = [], dbPerf = [], filtered = [], charts = {};
  const palette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];

  const clean = (s) => String(s || "").trim().toUpperCase();

  async function loadData() {
    try {
      const [r1, r2] = await Promise.all([
        fetch(`${URL_MASTER}&t=${Date.now()}`),
        fetch(`${URL_PERF}&t=${Date.now()}`)
      ]);
      dbMaster = parseCSV(await r1.text()).slice(1).filter(r => r[2]);
      dbPerf = parseCSV(await r2.text()).slice(1);
      
      initFilters();
      runFilters();
      setInterval(updateClock, 1000);
    } catch (e) { console.error("Load Error", e); }
  }

  function parseCSV(t) {
    return t.split(/\r?\n/).map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
  }

  function initFilters() {
    const getU = (i) => [...new Set(dbMaster.map(r => r[i]))].filter(v => v && v !== "-").sort();
    const fill = (id, v) => {
      const s = document.getElementById(id);
      s.innerHTML = `<option value="">All</option>` + v.map(x => `<option value="${x}">${x}</option>`).join('');
    };
    fill('fPlatform', getU(0)); fill('fGroup', getU(1)); fill('fTeam', getU(9)); fill('fShift', getU(5)); fill('fCountry', getU(8));
    ['searchName', 'fShift', 'fTeam', 'fGroup', 'fCountry', 'fPlatform'].forEach(id => {
      document.getElementById(id).addEventListener('input', runFilters);
    });
  }

  function runFilters() {
    const query = clean(document.getElementById('searchName').value);
    const fS = document.getElementById('fShift').value;
    const fT = document.getElementById('fTeam').value;
    const fG = document.getElementById('fGroup').value;
    const fC = document.getElementById('fCountry').value;
    const fP = document.getElementById('fPlatform').value;

    filtered = dbMaster.filter(r => 
      (clean(r[2]).includes(query) || clean(r[3]).includes(query)) &&
      (!fS || r[5] === fS) && (!fT || r[9] === fT) && (!fG || r[1] === fG) && (!fC || r[8] === fC) && (!fP || r[0] === fP)
    );
    renderTable();
    syncCharts();
  }

  function renderTable() {
    document.getElementById('tbody').innerHTML = filtered.map((r, i) => `
      <tr>
        <td>${r[0]}</td><td><span class="tag-wd">${r[1]}</span></td><td>${r[9]}</td>
        <td><button class="id-link" onclick="openDetail(${i})">#${r[2]}</button></td>
        <td style="font-weight:800">${r[3]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[8]}</td>
      </tr>
    `).join('');
  }

  function openDetail(idx) {
    const r = filtered[idx];
    const staffID = clean(r[2]);
    const perf = dbPerf.find(p => clean(p[0]) === staffID);

    document.getElementById('mName').innerText = r[3];
    document.getElementById('mID').innerText = "#" + r[2];
    
    // Hitung Tenure
    const join = new Date(r[6]);
    if(!isNaN(join)) {
      const diff = Math.ceil(Math.abs(new Date() - join) / (1000*60*60*24));
      document.getElementById('mTenure').innerText = diff + " Hari (" + r[6] + ")";
    }

    if (perf) {
      document.getElementById('mAvg').innerText = perf[4] || "0";
      document.getElementById('mTotal').innerText = perf[3] || "0";
      document.getElementById('mMentor').innerText = perf[2] || "-";
    } else {
      document.getElementById('mAvg').innerText = "0";
      document.getElementById('mTotal').innerText = "0";
      document.getElementById('mMentor').innerText = "Not Found in Perf Link";
    }
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function syncCharts() {
    let ds = { cWD: {}, cCS: {}, cFN: {}, cGEO: {}, cSH: {} };
    filtered.forEach(r => {
      const b = r[1]||"", j = r[9]||"";
      if (b.includes('出款') || j.includes('出款')) ds.cWD[b] = (ds.cWD[b]||0)+1;
      else if (b.includes('客服') || j.includes('客服') || b.includes('风控')) ds.cCS[b] = (ds.cCS[b]||0)+1;
      else if (b.includes('财务') || j.includes('财务')) ds.cFN[b] = (ds.cFN[b]||0)+1;
      if(r[8]) ds.cGEO[r[8]] = (ds.cGEO[r[8]]||0)+1;
      if(r[5]) ds.cSH[r[5]] = (ds.cSH[r[5]]||0)+1;
    });
    Object.keys(ds).forEach(id => {
      const entries = Object.entries(ds[id]).sort((a,b)=>b[1]-a[1]);
      const vals = entries.map(e => e[1]);
      const colors = entries.map((_, i) => palette[i % palette.length]);
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0 }] }, options: { plugins: { legend: false }, cutout: '75%', animation: false } });
      document.getElementById('t' + id.slice(1)).innerText = vals.reduce((a, b) => a + b, 0);
      document.getElementById('list_' + id).innerHTML = entries.slice(0, 3).map(([n, v], i) => `
        <div class="stat-row">
          <div style="display:flex;align-items:center;gap:5px;"><span class="dot" style="background:${colors[i]}"></span><span>${n}</span></div>
          <span>${v}</span>
        </div>`).join('');
    });
  }

  function updateClock() {
    document.getElementById('clock').innerText = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})).toLocaleTimeString('en-GB') + " AMT";
  }
  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  loadData();
</script>
</body>
</html>
