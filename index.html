<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus v6.8 | Multi-Source Performance</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    
    .table-container { background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 1.2rem 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    
    .id-link { background: #eff6ff; color: #2563eb; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: 800; transition: 0.2s; }
    .id-link:hover { background: var(--accent); color: white; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(8px); }
    .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 32px; padding: 2rem; position: relative; }
    .perf-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
    .perf-item { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
    .perf-label { font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
    .perf-val { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900;"><i class="fas fa-database"></i> NEXUS PERFORMANCE</div>
  <div id="status" style="font-size: 0.7rem; font-weight: 700; color: #10b981;">● SYSTEM READY</div>
</nav>

<div class="container">
  <div class="table-container">
    <div style="padding: 1rem; border-bottom: 1px solid var(--border); font-weight: 800;">STAFF LIST (MASTER DATA)</div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Platform</th><th>Group</th><th>ID Staff</th><th>Name</th><th>Team</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h2 id="mName" style="margin-bottom:5px;">Nama Staff</h2>
    <span id="mID" style="color:var(--accent); font-weight:800;">#ID</span>
    
    <div class="perf-grid">
      <div class="perf-item" style="grid-column: span 2; background: var(--primary); border:none;">
        <div class="perf-label" style="color:rgba(255,255,255,0.6)">Status Koneksi</div>
        <div class="perf-val" id="mStatus" style="color:white; font-size: 0.9rem;">Mencari data...</div>
      </div>
      <div class="perf-item">
        <div class="perf-label">Avg Harian</div>
        <div class="perf-val" id="mAvg">0</div>
      </div>
      <div class="perf-item">
        <div class="perf-label">Total Order</div>
        <div class="perf-val" id="mTotal">0</div>
      </div>
      <div class="perf-item" style="grid-column: span 2;">
        <div class="perf-label">Mentor</div>
        <div class="perf-val" id="mMentor">-</div>
      </div>
    </div>
    <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:10px; border-radius:10px; border:none; background:#eee; cursor:pointer; font-weight:700;">Tutup</button>
  </div>
</div>

<script>
  // LINK CSV MASING-MASING (Sudah dikonversi ke format CSV untuk pengambilan data)
  const URL_MASTER = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?gid=0&output=csv";
  const URL_PERFORMANCE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQlA6btKuVajZNe2XPoc3b9BAhbeqFYzAS97f2f8mawUCB4-NOHXryGY_b-4WyZ_A/pub?gid=0&output=csv";

  let dataMaster = [];
  let dataPerf = [];

  // Fungsi pembersih ID (hapus spasi & jadikan huruf besar)
  const cleanStr = (s) => String(s || "").trim().toUpperCase();

  async function init() {
    try {
      const [res1, res2] = await Promise.all([
        fetch(`${URL_MASTER}&t=${Date.now()}`),
        fetch(`${URL_PERFORMANCE}&t=${Date.now()}`)
      ]);

      dataMaster = parseCSV(await res1.text()).slice(1).filter(r => r[2]);
      dataPerf = parseCSV(await res2.text()).slice(1);

      console.log("Master Loaded:", dataMaster.length);
      console.log("Performance Loaded:", dataPerf.length);
      
      renderTable();
    } catch (e) {
      document.getElementById('status').innerText = "● CONNECTION ERROR";
      document.getElementById('status').style.color = "red";
    }
  }

  function parseCSV(text) {
    return text.split(/\r?\n/).map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));
  }

  function renderTable() {
    const html = dataMaster.map((r, i) => `
      <tr>
        <td>${r[0]}</td>
        <td><span class="tag-wd">${r[1]}</span></td>
        <td><span class="id-link" onclick="viewPerf(${i})">#${r[2]}</span></td>
        <td>${r[3]}</td>
        <td>${r[9] || '-'}</td>
        <td><button class="id-link" onclick="viewPerf(${i})">Cek Performa</button></td>
      </tr>
    `).join('');
    document.getElementById('tbody').innerHTML = html;
  }

  function viewPerf(idx) {
    const staff = dataMaster[idx];
    const staffID = cleanStr(staff[2]);
    
    // Mencari di Link Performance (Asumsi Kolom A=ID, B=Avg, C=Total, D=Mentor)
    // Sesuaikan index [1], [2], [3] jika urutan kolom di sheet performance berbeda
    const perf = dataPerf.find(p => cleanStr(p[0]) === staffID);

    document.getElementById('mName').innerText = staff[3];
    document.getElementById('mID').innerText = "#" + staff[2];

    if (perf) {
      document.getElementById('mStatus').innerText = "DATA TERHUBUNG";
      document.getElementById('mAvg').innerText = perf[4] || "0";   // Kolom E
      document.getElementById('mTotal').innerText = perf[3] || "0"; // Kolom D
      document.getElementById('mMentor').innerText = perf[2] || "-"; // Kolom C
    } else {
      document.getElementById('mStatus').innerText = "DATA TIDAK DITEMUKAN";
      document.getElementById('mAvg').innerText = "0";
      document.getElementById('mTotal').innerText = "0";
      document.getElementById('mMentor').innerText = "ID belum ada di sheet performance";
    }

    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  init();
</script>
</body>
</html>
