<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Master v3.7 | Monthly View</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); text-align: center; }
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); }
    .chart-box { width: 85px; height: 85px; margin: 0 auto 10px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.8rem; }
    .stat-list { max-height: 100px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    .stat-row { display: flex; justify-content: center; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; font-weight: 700; width: 100%; }
    .badge { padding: 1px 7px; border-radius: 8px; color: white; font-size: 0.6rem; min-width: 25px; }
    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    .table-header { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .search-input { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); width: 300px; outline: none; font-weight: 600; text-align: center; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; text-align: center; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; vertical-align: middle; }
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 3px 10px; border-radius: 6px; display: inline-block; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 3px 10px; border-radius: 6px; display: inline-block; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 3px 10px; border-radius: 6px; display: inline-block; }
    .month-pill { background: #eff6ff; color: #1e40af; padding: 3px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; border: 1px solid #dbeafe; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900; color: var(--primary); font-size: 1.1rem;"><i class="fas fa-calendar-alt" style="color:var(--accent)"></i> NEXUS<span>MONTHLY v3.7</span></div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card"><div style="color:var(--withdraw)" class="dept-title">出款 (Withdraw)</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div><div class="stat-list" id="lWD"></div></div>
    <div class="dept-card"><div style="color:var(--cs)" class="dept-title">客服 (Service)</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div><div class="stat-list" id="lCS"></div></div>
    <div class="dept-card"><div style="color:var(--finance)" class="dept-title">财务 (Finance)</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div><div class="stat-list" id="lFN"></div></div>
    <div class="dept-card"><div style="color:var(--country)" class="dept-title">国家 (Country)</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div><div class="stat-list" id="lGEO"></div></div>
    <div class="dept-card"><div style="color:var(--accent)" class="dept-title">Shift Info</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div><div class="stat-list" id="lSH"></div></div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <h3 style="font-weight: 800; font-size: 0.9rem;">Monthly Organized Personnel</h3>
      <input type="text" id="search" class="search-input" placeholder="Cari nama, ID, atau bulan...">
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Platform</th><th>Dept</th><th>Bagian (J)</th><th>ID</th><th>Nama</th><th>Shift</th><th>Bulan Masuk</th><th>Negara</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = []; let filtered = []; let charts = {};

  // --- FUNGSI HANYA BULAN & TAHUN ---
  function getMonthYear(val) {
    if (!val || val.trim() === "" || val === "-") return "-";
    
    let d = new Date(val);
    
    // Deteksi Angka Serial Excel (40000+)
    if (!isNaN(val) && val > 40000) {
      d = new Date((val - 25569) * 86400 * 1000);
    }

    if (!isNaN(d.getTime())) {
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      return `${months[d.getMonth()]} ${d.getFullYear()}`;
    }
    
    return val; // Jika format teks aneh, tampilkan aslinya
  }

  async function load() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      db = t.split(/\r?\n/).slice(1)
            .map(l => l.split(',').map(c => c.trim()))
            .filter(d => d[3]);
      filtered = [...db];
      setInterval(sync, 1000); sync(); render();
    } catch (e) { console.error(e); }
  }

  function sync() {
    const amt = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"}));
    document.getElementById('clock').innerText = amt.toLocaleTimeString('en-GB') + " AMT";
    
    let wdO = {}, csO = {}, fnO = {}, geO = {}, shO = { Day: 0, Night: 0, Mid: 0 };
    let wdT = 0, csT = 0, fnT = 0;

    db.forEach(r => {
      const dept = (r[1]||'').toLowerCase();
      const sub = (r[9]||'Unassigned');
      const shift = (r[5]||'').toLowerCase();
      const geo = (r[8]||'Unknown');

      if (shift.includes('day')) shO.Day++;
      else if (shift.includes('night')) shO.Night++;
      else if (shift.includes('mid')) shO.Mid++;

      if (dept.includes('出款') || sub.includes('出款')) { wdT++; wdO[sub] = (wdO[sub] || 0) + 1; }
      else if (dept.includes('客服') || sub.includes('客服')) { csT++; csO[sub] = (csO[sub] || 0) + 1; }
      else if (dept.includes('财务') || sub.includes('财务')) { fnT++; fnO[sub] = (fnO[sub] || 0) + 1; }
      geO[geo] = (geO[geo] || 0) + 1;
    });

    document.getElementById('tWD').innerText = wdT;
    document.getElementById('tCS').innerText = csT;
    document.getElementById('tFN').innerText = fnT;
    document.getElementById('tGEO').innerText = Object.keys(geO).length;
    document.getElementById('tSH').innerText = db.length;

    const draw = (id, data, colors) => {
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) {
        charts[id].data.labels = Object.keys(data);
        charts[id].data.datasets[0].data = Object.values(data);
        charts[id].update('none');
      } else {
        charts[id] = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: colors, borderWidth: 0 }] },
          options: { plugins: { legend: { display: false } }, cutout: '78%', responsive: true }
        });
      }
    };

    draw('cWD', wdO, ['#10b981', '#34d399', '#059669']);
    draw('cCS', csO, ['#8b5cf6', '#a78bfa', '#c4b5fd']);
    draw('cFN', fnO, ['#f59e0b', '#fbbf24', '#d97706']);
    draw('cGEO', geO, ['#f43f5e', '#fb7185', '#fda4af']);
    draw('cSH', shO, ['#2563eb', '#1e293b', '#64748b']);
  }

  function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = filtered.slice(0, 100).map(r => {
      let cls = 'tag-gen';
      if(r[1].includes('出款') || r[9].includes('出款')) cls = 'tag-wd';
      else if(r[1].includes('客服') || r[9].includes('客服')) cls = 'tag-cs';
      else if(r[1].includes('财务') || r[9].includes('财务')) cls = 'tag-fn';

      return `<tr>
        <td><b style="color:var(--accent)">${r[0]}</b></td>
        <td><span class="${cls}">${r[1]}</span></td>
        <td>${r[9]||'-'}</td>
        <td style="opacity:0.5">#${r[2]}</td>
        <td style="font-weight:800">${r[3]}</td>
        <td style="color:${r[5].toLowerCase().includes('mid')?'var(--finance)':'inherit'}">${r[5]}</td>
        <td><span class="month-pill">${getMonthYear(r[6])}</span></td>
        <td style="color:var(--country)">${r[8]}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filtered = db.filter(r => r.some(c => c.toLowerCase().includes(q)));
    render();
  });

  load();
</script>
</body>
</html>
