<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Intelligence | Professional Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.08);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f1f5f9; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 20px; --radius-md: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

    nav {
      position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
      padding: 0.7rem 5%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--primary); }
    .brand i { color: var(--accent); font-size: 1.5rem; }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* Analytics Section */
    .analytics-grid {
      display: grid; grid-template-columns: 200px 1fr 1fr; gap: 1.5rem; margin-top: 2rem;
    }

    .glass-card {
      background: var(--card-bg); border-radius: var(--radius-xl);
      border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      overflow: hidden; padding: 1.5rem;
    }

    .stat-title { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; display: flex; align-items: center; gap: 6px; }

    .data-scroll { max-height: 150px; overflow-y: auto; padding-right: 5px; }
    .data-scroll::-webkit-scrollbar { width: 4px; }
    .data-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .mini-pill { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--bg); border-radius: 8px; margin-bottom: 6px; font-size: 0.75rem; font-weight: 700; border: 1px solid transparent; transition: 0.2s; }
    .mini-pill:hover { border-color: var(--accent); background: white; }

    /* Master Table Fixed Container */
    .table-section { margin-top: 1.5rem; min-height: 650px; display: flex; flex-direction: column; }
    .table-container { flex-grow: 1; position: relative; background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; }
    
    .table-wrapper { height: 510px; overflow-y: auto; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 10; padding: 1rem; text-align: left; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Empty State */
    .no-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
    .no-data i { font-size: 3rem; color: var(--border); margin-bottom: 1rem; }
    .no-data p { font-weight: 700; color: var(--text-muted); }

    /* Search & Pagination */
    .toolbar { padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid var(--border); }
    .search-box { position: relative; }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-box input { padding: 10px 10px 10px 35px; border-radius: 10px; border: 1px solid var(--border); width: 300px; font-family: inherit; font-weight: 600; outline: none; }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    .pagination { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-top: 1px solid var(--border); }
    .btn-pg { padding: 8px 16px; border: 1px solid var(--border); background: white; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.75rem; transition: 0.2s; }
    .btn-pg:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-pg:disabled { opacity: 0.3; cursor: not-allowed; }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
    .active-badge { background: #dcfce7; color: #15803d; }
  </style>
</head>
<body>

<nav>
  <div class="brand"><i class="fas fa-shield-halved"></i> NEXUS<span>ADMIN</span></div>
  <div id="status" style="font-size: 0.75rem; font-weight: 800; color: var(--success);"><i class="fas fa-circle-check"></i> SYSTEM ONLINE</div>
</nav>

<div class="container">
  <div class="analytics-grid">
    <div class="glass-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
      <div style="width: 130px; height: 130px;">
        <canvas id="countryChart"></canvas>
      </div>
    </div>

    <div class="glass-card">
      <div class="stat-title"><i class="fas fa-briefcase"></i> Distribusi Jabatan</div>
      <div id="jobList" class="data-scroll"></div>
    </div>

    <div class="glass-card">
      <div class="stat-title"><i class="fas fa-globe"></i> Distribusi Negara</div>
      <div id="geoList" class="data-scroll"></div>
    </div>
  </div>

  <div class="table-section">
    <div class="table-container">
      <div class="toolbar">
        <h4 style="font-weight: 800;">Database Karyawan</h4>
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="masterSearch" placeholder="Cari nama, ID, jabatan...">
        </div>
      </div>

      <div class="table-wrapper">
        <table id="mainTable">
          <thead>
            <tr>
              <th style="width: 100px;">Platform</th>
              <th style="width: 150px;">Jabatan</th>
              <th style="width: 80px;">ID</th>
              <th style="width: 250px;">Nama Lengkap</th>
              <th style="width: 140px;">Negara</th>
              <th style="width: 100px;">Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        
        <div id="noData" class="no-data">
          <i class="fas fa-search-minus"></i>
          <p>Pencarian Tidak Ditemukan</p>
        </div>
      </div>

      <div class="pagination">
        <span id="pageInfo" style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted);">Showing 0-0 of 0</span>
        <div style="display: flex; gap: 8px;">
          <button class="btn-pg" id="prevBtn" onclick="changePage(-1)">PREV</button>
          <button class="btn-pg" id="nextBtn" onclick="changePage(1)">NEXT</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  
  let rawData = [];
  let viewData = [];
  let currentPage = 1;
  const limit = 10;
  let chart = null;

  async function loadData() {
    try {
      const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const text = await res.text();
      const lines = text.split(/\r?\n/).map(l => l.split(',')).filter(l => l.length > 5);
      rawData = lines.slice(1).filter(r => r[3] && r[3].trim() !== "");
      viewData = [...rawData];
      
      updateAnalytics();
      render();
    } catch (e) {
      console.error("Gagal load CSV", e);
    }
  }

  function updateAnalytics() {
    const jobs = {};
    const geos = {};

    rawData.forEach(r => {
      const j = (r[1] || 'Unknown').trim();
      const g = (r[8] || 'Unknown').trim();
      jobs[j] = (jobs[j] || 0) + 1;
      geos[g] = (geos[g] || 0) + 1;
    });

    // Render List Jabatan
    document.getElementById('jobList').innerHTML = Object.entries(jobs)
      .map(([name, count]) => `<div class="mini-pill"><span>${name}</span><span style="color:var(--accent)">${count}</span></div>`).join('');

    // Render List Negara
    document.getElementById('geoList').innerHTML = Object.entries(geos)
      .map(([name, count]) => `<div class="mini-pill"><span>${name}</span><span style="color:var(--success)">${count}</span></div>`).join('');

    // Render Chart Kecil
    const ctx = document.getElementById('countryChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(geos),
        datasets: [{
          data: Object.values(geos),
          backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
          borderWidth: 0
        }]
      },
      options: { plugins: { legend: { display: false } }, cutout: '70%' }
    });
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    const noData = document.getElementById('noData');
    const start = (currentPage - 1) * limit;
    const pageSlice = viewData.slice(start, start + limit);

    if (viewData.length === 0) {
      tbody.innerHTML = '';
      noData.style.display = 'block';
    } else {
      noData.style.display = 'none';
      tbody.innerHTML = pageSlice.map(r => `
        <tr>
          <td><span class="badge" style="background:var(--accent-soft); color:var(--accent)">${r[0]}</span></td>
          <td>${r[1]}</td>
          <td style="font-family:monospace; opacity:0.6;">#${r[2]}</td>
          <td style="font-weight:800;">${r[3]}</td>
          <td><i class="fas fa-map-pin" style="color:var(--danger); font-size:0.7rem; margin-right:5px;"></i> ${r[8]}</td>
          <td><span class="badge ${r[9].toLowerCase().includes('aktif')?'active-badge':''}">${r[9]}</span></td>
        </tr>
      `).join('');
    }

    // Update Pagination Info
    const totalPages = Math.ceil(viewData.length / limit);
    document.getElementById('pageInfo').innerText = `SHOWING ${viewData.length ? start + 1 : 0} - ${Math.min(start + limit, viewData.length)} OF ${viewData.length}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function changePage(step) {
    currentPage += step;
    render();
  }

  document.getElementById('masterSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    viewData = rawData.filter(r => r.some(col => col.toLowerCase().includes(q)));
    currentPage = 1;
    render();
  });

  loadData();
</script>
</body>
</html>
