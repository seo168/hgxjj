<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus HR | Enterprise Intelligence Portal</title>
  
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #0f172a;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.95);
      --border: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --radius-xl: 20px;
      --radius-md: 12px;
      --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      background-image: 
        radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.05) 0px, transparent 50%);
      min-height: 100vh;
    }

    /* --- Navigation --- */
    nav {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 5%;
      display: flex; justify-content: space-between; align-items: center;
    }

    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; }
    .brand i { color: var(--accent); font-size: 1.8rem; }
    
    .sync-status { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; color: var(--success); }
    .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }

    /* --- Dashboard Content --- */
    .container { max-width: 1400px; margin: 2.5rem auto; padding: 0 2rem; }

    .header-section { margin-bottom: 2rem; }
    .header-section h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
    
    /* Stats Cards */
    .stats-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem; margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--card-bg); padding: 1.8rem; border-radius: var(--radius-xl);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      transition: transform 0.3s ease; display: flex; align-items: center; gap: 1.5rem;
    }
    .stat-card:hover { transform: translateY(-5px); }
    
    .icon-box {
      width: 60px; height: 60px; border-radius: 16px;
      display: grid; place-items: center; font-size: 1.5rem;
    }

    /* --- Data Table Section --- */
    .data-card {
      background: var(--card-bg); border-radius: var(--radius-xl);
      border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
    }

    .data-toolbar {
      padding: 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem;
    }

    .search-group { position: relative; flex: 1; min-width: 300px; }
    .search-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-group input {
      width: 100%; padding: 14px 14px 14px 48px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg); outline: none;
      font-family: inherit; font-weight: 500; transition: all 0.3s ease;
    }
    .search-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

    /* Table Architecture */
    .table-responsive { overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; min-width: 1100px; }
    
    th {
      background: #fcfdfe; padding: 1rem 1.5rem; font-size: 0.75rem;
      font-weight: 700; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 1px; border-bottom: 2px solid var(--border); text-align: left;
    }

    td {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; transition: background 0.2s;
    }

    tr:hover td { background: rgba(37, 99, 235, 0.02); }

    /* Column Widths */
    .w-100 { width: 100px; } .w-150 { width: 150px; } .w-200 { width: 200px; } .w-80 { width: 80px; }

    /* Badges & UI Elements */
    .badge {
      padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .badge-primary { background: var(--accent-soft); color: var(--accent); }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-neutral { background: #f1f5f9; color: #475569; }

    .user-cell { display: flex; align-items: center; gap: 12px; }
    .avatar-sm { 
      width: 32px; height: 32px; background: var(--accent); color: white; 
      border-radius: 50%; display: grid; place-items: center; font-size: 0.8rem; font-weight: 700;
    }

    /* Pagination */
    .pagination-bar {
      padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center;
      background: #fcfdfe;
    }
    .btn-action {
      padding: 10px 20px; border-radius: var(--radius-md); border: 1px solid var(--border);
      background: white; cursor: pointer; font-weight: 700; font-size: 0.85rem;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-action:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Animations */
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    
    /* Skeleton Loader */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; height: 16px; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    @media (max-width: 992px) {
      .data-toolbar { flex-direction: column; align-items: stretch; }
      .search-group { min-width: 100%; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <i class="fas fa-layer-group"></i>
      <span>NEXUS <span style="font-weight: 300; color: var(--text-muted);">OS</span></span>
    </div>
    <div class="sync-status">
      <div class="dot"></div> LIVE DATABASE SYNC
    </div>
  </nav>

  <div class="container">
    <div class="header-section">
      <h1>Intelijen Karyawan</h1>
      <p style="color: var(--text-muted); font-weight: 500;">Pantau performa, data personal, dan status operasional real-time.</p>
    </div>

    <div class="stats-container">
      <div class="stat-card">
        <div class="icon-box" style="background: var(--accent-soft); color: var(--accent);"><i class="fas fa-users-viewfinder"></i></div>
        <div>
          <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">HEADCOUNT</p>
          <h2 id="stat-total" style="font-size: 1.8rem; font-weight: 800;">--</h2>
        </div>
      </div>
      <div class="stat-card">
        <div class="icon-box" style="background: #ecfdf5; color: var(--success);"><i class="fas fa-bolt"></i></div>
        <div>
          <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">ACTIVE SHIFTS</p>
          <h2 style="font-size: 1.5rem; font-weight: 800;">Day / Night</h2>
        </div>
      </div>
      <div class="stat-card">
        <div class="icon-box" style="background: #fffbeb; color: var(--warning);"><i class="fas fa-globe-asia"></i></div>
        <div>
          <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600;">OPERATIONAL AREA</p>
          <h2 style="font-size: 1.5rem; font-weight: 800;">Multi-Region</h2>
        </div>
      </div>
    </div>

    <div class="data-card">
      <div class="data-toolbar">
        <div class="search-group">
          <i class="fas fa-search"></i>
          <input type="text" id="masterSearch" placeholder="Cari berdasarkan Nama, ID, Username, atau Departemen...">
        </div>
        <div style="display: flex; gap: 10px;">
           <button class="btn-action" onclick="reloadData()"><i class="fas fa-sync"></i> Refresh</button>
        </div>
      </div>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th class="w-100">Platform</th>
              <th class="w-150">Jabatan</th>
              <th class="w-80">ID</th>
              <th class="w-200">Karyawan</th>
              <th class="w-150">Akun Sistem</th>
              <th class="w-100">Shift</th>
              <th class="w-150">Tgl Bergabung</th>
              <th class="w-150">Negara</th>
              <th class="w-100">Status</th>
            </tr>
          </thead>
          <tbody id="masterTable">
            <tr><td colspan="9"><div class="skeleton"></div></td></tr>
            <tr><td colspan="9"><div class="skeleton"></div></td></tr>
            <tr><td colspan="9"><div class="skeleton"></div></td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <div id="paginationText" style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">
          Processing records...
        </div>
        <div style="display: flex; gap: 10px;">
          <button id="prevBtn" class="btn-action"><i class="fas fa-chevron-left"></i> Previous</button>
          <button id="nextBtn" class="btn-action">Next <i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
    const LIMIT = 12;
    
    let db = [];
    let view = [];
    let page = 1;

    async function fetchData() {
      try {
        const res = await fetch(`${GOOGLE_CSV}&t=${new Date().getTime()}`);
        const text = await res.text();
        const rows = parseCSV(text);
        
        db = rows.slice(1).filter(r => r.length > 2);
        view = [...db];
        document.getElementById('stat-total').innerText = db.length;
        render();
      } catch (e) {
        document.getElementById('masterTable').innerHTML = '<tr><td colspan="9" style="text-align:center; padding:4rem; color:var(--danger); font-weight:700;">ERROR: Database Connection Failed</td></tr>';
      }
    }

    function parseCSV(s) {
      const result = [];
      let row = [], cell = "", q = false;
      for (let i = 0; i < s.length; i++) {
        let c = s[i], n = s[i+1];
        if (c == '"' && q && n == '"') { cell += c; i++; continue; }
        if (c == '"') { q = !q; continue; }
        if (c == ',' && !q) { row.push(cell); cell = ""; continue; }
        if (c == '\n' && !q) { row.push(cell); result.push(row); row = []; cell = ""; continue; }
        cell += c;
      }
      row.push(cell); result.push(row);
      return result;
    }

    function render() {
      const container = document.getElementById('masterTable');
      container.innerHTML = '';
      
      const start = (page - 1) * LIMIT;
      const end = start + LIMIT;
      const slice = view.slice(start, end);

      if (slice.length === 0) {
        container.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:4rem;"><i class="fas fa-folder-open" style="font-size:2rem; display:block; margin-bottom:1rem; opacity:0.2;"></i> Tidak ada data yang sesuai pencarian.</td></tr>';
      }

      slice.forEach(row => {
        const tr = document.createElement('tr');
        const status = (row[9] || '').toLowerCase();
        const statusBadge = status.includes('aktif') ? 'badge-success' : 'badge-neutral';
        const initials = row[3] ? row[3].substring(0,2).toUpperCase() : '??';

        tr.innerHTML = `
          <td><span class="badge badge-primary">${row[0] || '-'}</span></td>
          <td style="color:var(--text-main); font-weight:700;">${row[1] || '-'}</td>
          <td style="font-family: monospace;">#${row[2] || '-'}</td>
          <td>
            <div class="user-cell">
              <div class="avatar-sm">${initials}</div>
              <span style="font-weight:700;">${row[3] || '-'}</span>
            </div>
          </td>
          <td style="color: var(--accent); font-weight: 600;">${row[4] || '-'}</td>
          <td>${row[5] || '-'}</td>
          <td><i class="far fa-calendar-alt" style="margin-right:6px; opacity:0.5;"></i> ${row[6] || '-'}</td>
          <td><i class="fas fa-map-marker-alt" style="margin-right:6px; opacity:0.5;"></i> ${row[8] || '-'}</td>
          <td><span class="badge ${statusBadge}">${row[9] || '-'}</span></td>
        `;
        container.appendChild(tr);
      });

      const totalPages = Math.ceil(view.length / LIMIT);
      document.getElementById('paginationText').innerText = `SHOWING ${view.length ? start + 1 : 0} — ${Math.min(end, view.length)} OF ${view.length} RECORDS`;
      document.getElementById('prevBtn').disabled = page === 1;
      document.getElementById('nextBtn').disabled = page >= totalPages || totalPages === 0;
    }

    // Advanced Search
    document.getElementById('masterSearch').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      view = db.filter(r => r.some(c => c.toLowerCase().includes(q)));
      page = 1;
      render();
    });

    function reloadData() {
      document.getElementById('masterTable').innerHTML = '<tr><td colspan="9"><div class="skeleton"></div></td></tr><tr><td colspan="9"><div class="skeleton"></div></td></tr>';
      fetchData();
    }

    document.getElementById('prevBtn').onclick = () => { if(page > 1) { page--; render(); } };
    document.getElementById('nextBtn').onclick = () => { if(page < Math.ceil(view.length/LIMIT)) { page++; render(); } };

    // Init
    fetchData();
  </script>
</body>
</html>
