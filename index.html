<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Intelligence v2.5 | Live Stats</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.1);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f1f5f9; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

    nav {
      position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
      padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--primary); }
    .brand i { color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

    /* Live Status Cards */
    .live-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2rem; }
    .status-card { background: white; padding: 1.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border); display: flex; align-items: center; gap: 1.5rem; }
    .status-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .val { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .lab { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; }

    /* Middle Analytics */
    .analytics-row { display: grid; grid-template-columns: 220px 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    .glass-card { background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); padding: 1.5rem; overflow: hidden; }
    .scroll-box { max-height: 160px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
    .scroll-box::-webkit-scrollbar { width: 4px; }
    .scroll-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    .item-row { display: flex; justify-content: space-between; padding: 8px 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 6px; font-size: 0.75rem; font-weight: 700; }

    /* Table System */
    .table-box { margin-top: 1.5rem; background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; min-height: 600px; display: flex; flex-direction: column; }
    .toolbar { padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .table-wrapper { flex-grow: 1; overflow: auto; position: relative; }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
    th { position: sticky; top: 0; background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); z-index: 5; }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .pagination { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
    .btn-pg { padding: 8px 16px; border: 1px solid var(--border); background: white; border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 0.7rem; }
    .btn-pg:disabled { opacity: 0.3; }

    .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
    .dot-online { width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
  </style>
</head>
<body>

<nav>
  <div class="brand"><i class="fas fa-microchip"></i> NEXUS<span>TRACK</span></div>
  <div id="armeniaTime" style="font-size: 0.8rem; font-weight: 800; color: var(--accent);">TIME: --:--:-- (AMT)</div>
</nav>

<div class="container">
  <div class="live-grid">
    <div class="status-card">
      <div class="status-icon" style="background:#eff6ff; color:var(--accent)"><i class="fas fa-users"></i></div>
      <div><div class="val" id="totalStaff">0</div><div class="lab">Total Staff</div></div>
    </div>
    <div class="status-card">
      <div class="status-icon" style="background:#ecfdf5; color:var(--success)"><i class="fas fa-signal"></i></div>
      <div><div class="val" id="totalOnline" style="color:var(--success)">0</div><div class="lab">Online Now (AMT)</div></div>
    </div>
    <div class="status-card">
      <div class="status-icon" style="background:#fef2f2; color:var(--danger)"><i class="fas fa-moon"></i></div>
      <div><div class="val" id="totalOffline" style="color:var(--danger)">0</div><div class="lab">Offline / Resting</div></div>
    </div>
  </div>

  <div class="analytics-row">
    <div class="glass-card" style="display:flex; align-items:center; justify-content:center;">
      <canvas id="countryChart" style="max-width: 140px;"></canvas>
    </div>
    <div class="glass-card">
      <div class="lab"><i class="fas fa-briefcase"></i> Total per Jabatan</div>
      <div id="jobList" class="scroll-box"></div>
    </div>
    <div class="glass-card">
      <div class="lab"><i class="fas fa-globe"></i> Total per Negara</div>
      <div id="geoList" class="scroll-box"></div>
    </div>
  </div>

  <div class="table-box">
    <div class="toolbar">
      <h4 style="font-weight: 800;">Real-Time Database</h4>
      <input type="text" id="masterSearch" style="padding:10px 15px; border-radius:10px; border:1px solid var(--border); width: 300px; font-weight: 600;" placeholder="Search staff...">
    </div>
    <div class="table-wrapper">
      <table id="mainTable">
        <thead>
          <tr>
            <th style="width: 100px;">Platform</th>
            <th style="width: 150px;">Jabatan</th>
            <th style="width: 80px;">ID</th>
            <th style="width: 250px;">Nama Lengkap</th>
            <th style="width: 150px;">Shift</th>
            <th style="width: 100px;">Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="noData" style="display:none; text-align:center; padding: 100px; color:var(--text-muted); font-weight:700;">Data Tidak Ditemukan</div>
    </div>
    <div class="pagination">
      <span id="pageInfo" style="font-size: 0.75rem; font-weight: 800; color: var(--text-muted);">Page 1 of 1</span>
      <div style="display:flex; gap:10px;">
        <button class="btn-pg" id="prevBtn" onclick="changePage(-1)">PREV</button>
        <button class="btn-pg" id="nextBtn" onclick="changePage(1)">NEXT</button>
      </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  
  let rawData = [];
  let viewData = [];
  let currentPage = 1;
  const limit = 10;
  let chart = null;

  async function init() {
    try {
      const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const text = await res.text();
      const lines = text.split(/\r?\n/).map(l => l.split(',')).filter(l => l.length > 5);
      rawData = lines.slice(1).filter(r => r[3] && r[3].trim() !== "");
      viewData = [...rawData];
      
      updateClockAndStats();
      setInterval(updateClockAndStats, 1000); // Update waktu tiap detik
      render();
    } catch (e) { console.error(e); }
  }

  function getArmeniaTime() {
    // Jam Armenia (UTC+4)
    return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"}));
  }

  function updateClockAndStats() {
    const now = getArmeniaTime();
    const hours = now.getHours();
    const mins = now.getMinutes();
    const totalMins = hours * 60 + mins;

    document.getElementById('armeniaTime').innerText = `ARMENIA: ${now.toLocaleTimeString('en-GB')}`;

    let online = 0;
    const jobs = {};
    const geos = {};

    rawData.forEach(r => {
      const shift = (r[5] || '').toLowerCase();
      let isOnline = false;

      // Logika Shift Armenia
      if (shift.includes('day')) {
        if (hours >= 4 && hours < 16) isOnline = true;
      } else if (shift.includes('night')) {
        if (hours >= 16 || hours < 4) isOnline = true;
      } else if (shift.includes('mid')) {
        // Jam 09:30 sampai 21:30 (instruksi Anda)
        if (totalMins >= 570 && totalMins < 1290) isOnline = true;
      }

      if (isOnline) online++;
      
      // Hitung Analytics
      const j = (r[1] || 'Unknown').trim();
      const g = (r[8] || 'Unknown').trim();
      jobs[j] = (jobs[j] || 0) + 1;
      geos[g] = (geos[g] || 0) + 1;
    });

    document.getElementById('totalStaff').innerText = rawData.length;
    document.getElementById('totalOnline').innerText = online;
    document.getElementById('totalOffline').innerText = rawData.length - online;

    // Update List Visual
    document.getElementById('jobList').innerHTML = Object.entries(jobs).map(([n, c]) => `<div class="item-row"><span>${n}</span><span>${c}</span></div>`).join('');
    document.getElementById('geoList').innerHTML = Object.entries(geos).map(([n, c]) => `<div class="item-row"><span>${n}</span><span>${c}</span></div>`).join('');

    updateChart(geos);
  }

  function updateChart(geos) {
    const ctx = document.getElementById('countryChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(geos),
        datasets: [{ data: Object.values(geos), backgroundColor: ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6'], borderWidth: 0 }]
      },
      options: { plugins: { legend: { display: false } }, cutout: '75%' }
    });
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    const start = (currentPage - 1) * limit;
    const pageSlice = viewData.slice(start, start + limit);

    document.getElementById('noData').style.display = viewData.length === 0 ? 'block' : 'none';
    
    tbody.innerHTML = pageSlice.map(r => {
      const now = getArmeniaTime();
      const h = now.getHours();
      const shift = (r[5]||'').toLowerCase();
      let live = false;
      if(shift.includes('day') && (h>=4 && h<16)) live = true;
      if(shift.includes('night') && (h>=16 || h<4)) live = true;
      if(shift.includes('mid') && (now.getHours()*60+now.getMinutes() >= 570 && now.getHours()*60+now.getMinutes() < 1290)) live = true;

      return `
        <tr>
          <td><span class="badge" style="background:var(--accent-soft); color:var(--accent)">${r[0]}</span></td>
          <td>${r[1]}</td>
          <td style="opacity:0.5;">#${r[2]}</td>
          <td style="font-weight:800;">${r[3]}</td>
          <td style="font-size:0.75rem;">${r[5]}</td>
          <td>${live ? '<span class="dot-online"></span><b style="color:var(--success)">ONLINE</b>' : '<b style="color:var(--text-muted)">OFFLINE</b>'}</td>
        </tr>
      `;
    }).join('');

    const totalPages = Math.ceil(viewData.length / limit);
    document.getElementById('pageInfo').innerText = `PAGE ${currentPage} OF ${totalPages || 1}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function changePage(s) { currentPage += s; render(); }

  document.getElementById('masterSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    viewData = rawData.filter(r => r.some(col => col.toLowerCase().includes(q)));
    currentPage = 1;
    render();
  });

  init();
</script>
</body>
</html>
