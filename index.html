<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus v6.8 | Ultimate Navigation</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    
    /* Navbar & Clock */
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    
    /* Stats Grid */
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); min-height: 260px; transition: 0.3s; }
    .chart-box { width: 85px; height: 85px; margin: 0 auto 15px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.85rem; }
    .dept-title { font-size: 0.7rem; font-weight: 800; text-align: center; margin-bottom: 15px; text-transform: uppercase; }

    /* Menu Tabs */
    .nav-menu { display: flex; gap: 12px; margin-bottom: 1.5rem; padding: 10px; background: white; border-radius: 20px; border: 1px solid var(--border); }
    .menu-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.3s; background: #f8fafc; border: none; outline: none; }
    .menu-btn:hover { background: #f1f5f9; color: var(--primary); }
    .menu-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }

    /* Page Visibility Control */
    .page-content { display: none; }
    .page-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Filters & Tables */
    .filter-wrapper { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 1rem; }
    .filter-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
    .filter-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
    .filter-group select, .filter-group input { width: 100%; padding: 11px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; outline: none; }

    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 3px 10px; border-radius: 6px; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 3px 10px; border-radius: 6px; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 3px 10px; border-radius: 6px; }
    .date-badge { background: #f1f5f9; padding: 4px 10px; border-radius: 6px; font-family: monospace; font-size: 0.75rem; font-weight: 700; }

    .stat-list { display: flex; flex-direction: column; gap: 5px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 5px; font-size: 0.65rem; font-weight: 700; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .count-badge { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900;"><i class="fas fa-layer-group"></i> NEXUS v6.8</div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card"><div style="color:var(--withdraw)" class="dept-title">出款部汇总</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div><div class="stat-list" id="list_cWD"></div></div>
    <div class="dept-card"><div style="color:var(--cs)" class="dept-title">客服部汇总</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div><div class="stat-list" id="list_cCS"></div></div>
    <div class="dept-card"><div style="color:var(--finance)" class="dept-title">财务部汇总</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div><div class="stat-list" id="list_cFN"></div></div>
    <div class="dept-card"><div style="color:var(--country)" class="dept-title">国家汇总</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div><div class="stat-list" id="list_cGEO"></div></div>
    <div class="dept-card"><div style="color:var(--accent)" class="dept-title">班次汇总</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div><div class="stat-list" id="list_cSH"></div></div>
  </div>

  <div class="nav-menu">
    <button onclick="showPage('overview')" id="btn-overview" class="menu-btn active"><i class="fas fa-th-large"></i> OVERVIEW</button>
    <button onclick="showPage('performance')" id="btn-performance" class="menu-btn"><i class="fas fa-chart-line"></i> PERFORMANCE</button>
    <button onclick="showPage('absent')" id="btn-absent" class="menu-btn"><i class="fas fa-user-clock"></i> ABSENT RECORD</button>
    <button onclick="showPage('salary')" id="btn-salary" class="menu-btn"><i class="fas fa-wallet"></i> SALARY SLIP</button>
  </div>

  <div id="overview" class="page-content active">
    <div class="filter-wrapper">
      <div class="filter-grid">
        <div class="filter-group"><label>Keyword</label><input type="text" id="searchName" placeholder="Search..."></div>
        <div class="filter-group"><label>Shift</label><select id="fShift"></select></div>
        <div class="filter-group"><label>Team (J)</label><select id="fTeam"></select></div>
        <div class="filter-group"><label>Group (B)</label><select id="fGroup"></select></div>
        <div class="filter-group"><label>Country</label><select id="fCountry"></select></div>
        <div class="filter-group"><label>Platform</label><select id="fPlatform"></select></div>
      </div>
    </div>

    <div class="table-container">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr><th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="performance" class="page-content">
  
  <div class="table-container" style="margin-bottom: 2rem; border-top: 4px solid var(--withdraw);">
    <div style="padding: 1rem; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between;">
      <span><i class="fas fa-money-bill-wave"></i> 出款部明细 (WITHDRAW)</span>
      <span id="countWD" class="count-badge">0 Records</span>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr><th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th></tr>
        </thead>
        <tbody id="tbodyWD"></tbody>
      </table>
    </div>
  </div>

  <div class="table-container" style="margin-bottom: 2rem; border-top: 4px solid var(--cs);">
    <div style="padding: 1rem; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between;">
      <span><i class="fas fa-user-shield"></i> 客服 / 风控部明细 (CS / RISK)</span>
      <span id="countCS" class="count-badge">0 Records</span>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr><th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th></tr>
        </thead>
        <tbody id="tbodyCS"></tbody>
      </table>
    </div>
  </div>

  <div class="table-container" style="margin-bottom: 2rem; border-top: 4px solid var(--finance);">
    <div style="padding: 1rem; background: #f8fafc; font-weight: 800; display: flex; justify-content: space-between;">
      <span><i class="fas fa-file-invoice-dollar"></i> 财务部明细 (FINANCE)</span>
      <span id="countFN" class="count-badge">0 Records</span>
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr><th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th></tr>
        </thead>
        <tbody id="tbodyFN"></tbody>
      </table>
    </div>
  </div>
</div>
  
  <div id="absent" class="page-content">
    <div class="table-container" style="padding: 40px; text-align: center;"><h3>Absent Record Content</h3></div>
  </div>

  <div id="salary" class="page-content">
    <div class="table-container" style="padding: 40px; text-align: center;"><h3>Salary Slip Content</h3></div>
  </div>

</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = [], filtered = [], charts = {};
  const palette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#06b6d4"];

  // 1. Tab Switching System (INSTANT)
  function showPage(pageId) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
    
    document.getElementById(pageId).classList.add('active');
    document.getElementById('btn-' + pageId).classList.add('active');
  }

  // 2. Data Loading & Parsing (Hanya Sekali)
  async function load() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      db = t.split(/\r?\n/).slice(1).map(l => l.split(',').map(c => c.trim())).filter(d => d[3]);
      
      initFilters();
      runFilters();
      
      // Clock
      setInterval(() => {
        document.getElementById('clock').innerText = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})).toLocaleTimeString('en-GB') + " AMT";
      }, 1000);
    } catch (e) { console.error("Load Error:", e); }
  }

  function initFilters() {
    const getU = (idx) => [...new Set(db.map(r => r[idx]))].filter(v => v && v !== "-").sort();
    const fill = (id, vals) => {
      const s = document.getElementById(id);
      s.innerHTML = `<option value="">All Records</option>`;
      vals.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
    };
    fill('fPlatform', getU(0));
    fill('fGroup', getU(1));
    fill('fTeam', getU(9));
    fill('fShift', getU(5));
    fill('fCountry', getU(8));
    
    ['searchName', 'fShift', 'fTeam', 'fGroup', 'fCountry', 'fPlatform'].forEach(id => {
      document.getElementById(id).addEventListener('input', runFilters);
    });
  }

  function runFilters() {
    const sn = document.getElementById('searchName').value.toLowerCase();
    const sf = document.getElementById('fShift').value;
    const st = document.getElementById('fTeam').value;
    const sg = document.getElementById('fGroup').value;
    const sc = document.getElementById('fCountry').value;
    const sp = document.getElementById('fPlatform').value;
    
    filtered = db.filter(r => (r.join(' ').toLowerCase().includes(sn)) && (!sf || r[5] === sf) && (!sg || r[1] === sg) && (!st || r[9] === st) && (!sc || r[8] === sc) && (!sp || r[0] === sp));
    updateUI();
  }

  function formatDate(v) {
    if (!v || v === "-") return "-";
    let d = (!isNaN(v) && v.length > 4) ? new Date((v - 25569) * 86400 * 1000) : new Date(v.replace(/-/g, '/'));
    if (isNaN(d.getTime())) return v;
    return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
  }

  function updateUI() {
    const tbody = document.getElementById('tbody');
    // Tampilkan 50 data pertama agar tidak berat saat render
    tbody.innerHTML = filtered.slice(0, 50).map(r => {
      const b = r[1]||"", j = r[9]||"";
      let cls = (b.includes('出款') || j.includes('出款')) ? 'tag-wd' : (b.includes('客服') || j.includes('客服')) ? 'tag-cs' : (b.includes('财务') || j.includes('财务')) ? 'tag-fn' : '';
      return `<tr><td><b>${r[0]}</b></td><td><span class="${cls}">${r[1]}</span></td><td>${r[9]}</td><td style="opacity:0.5">#${r[2]}</td><td style="font-weight:800">${r[3]}</td><td>${r[5]}</td><td><span class="date-badge">${formatDate(r[6])}</span></td><td style="color:var(--country)">${r[8]}</td></tr>`;
    }).join('');
    syncCharts();
  }

  function syncCharts() {
    let ds = { cWD: {}, cCS: {}, cFN: {}, cGEO: {}, cSH: {} };
    filtered.forEach(r => {
      const b = r[1]||"", j = r[9]||"";
      if (b.includes('出款') || j.includes('出款')) ds.cWD[b] = (ds.cWD[b]||0)+1;
      else if (b.includes('客服') || j.includes('客服')) ds.cCS[b] = (ds.cCS[b]||0)+1;
      else if (b.includes('财务') || j.includes('财务')) ds.cFN[b] = (ds.cFN[b]||0)+1;
      if(r[8]) ds.cGEO[r[8]] = (ds.cGEO[r[8]]||0)+1;
      if(r[5]) ds.cSH[r[5]] = (ds.cSH[r[5]]||0)+1;
    });

    Object.keys(ds).forEach(id => {
      const entries = Object.entries(ds[id]).sort((a,b)=>b[1]-a[1]);
      const vals = entries.map(e => e[1]);
      const colors = entries.map((_, i) => palette[i % palette.length]);
      
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: vals, backgroundColor: colors, borderWidth: 0 }] }, options: { plugins: { legend: { display: false } }, cutout: '75%', animation: false } });
      
      document.getElementById('t' + id.slice(1)).innerText = vals.reduce((a, b) => a + b, 0);
      document.getElementById('list_' + id).innerHTML = entries.slice(0, 4).map(([n, v], i) => `<div class="stat-row"><div class="indicator"><span class="dot" style="background:${colors[i]}"></span><span>${n}</span></div><span class="count-badge">${v}</span></div>`).join('');
    });
  }

  load();
</script>
</body>
</html>
