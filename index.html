<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Executive v3.1 | Accuracy Fix</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.1);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .container { max-width: 1500px; margin: 0 auto; padding: 0 2rem 4rem; }
    .analytics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 2rem; }
    .stat-card { background: white; padding: 1.2rem; border-radius: var(--radius-xl); border: 1px solid var(--border); }
    .chart-box { width: 90px; height: 90px; margin: 0 auto 0.8rem; position: relative; }
    .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.75rem; }
    .stat-list { max-height: 100px; overflow-y: auto; margin-top: 8px; }
    .stat-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; font-weight: 700; }
    .val-badge { background: var(--primary); color: white; padding: 1px 6px; border-radius: 6px; }
    .table-section { margin-top: 2rem; background: white; border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; }
    .toolbar { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .search-input { padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); width: 300px; outline: none; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; }
    .sub-tag { background: var(--accent-soft); color: var(--accent); padding: 3px 7px; border-radius: 5px; font-size: 0.65rem; font-weight: 800; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight:800; color:var(--primary);"><i class="fas fa-shield-halved" style="color:var(--accent)"></i> NEXUS<span>PRO</span></div>
  <div class="amt-clock" id="liveTime">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="analytics-grid">
    <div class="stat-card">
      <div class="chart-box"><canvas id="c1"></canvas><div class="chart-center" id="t1">0</div></div>
      <h4 style="font-size:0.6rem; text-align:center; color:var(--text-muted);">TOTAL STAFF BY SHIFT</h4>
      <div class="stat-list" id="l1"></div>
    </div>
    <div class="stat-card">
      <div class="chart-box"><canvas id="c2"></canvas><div class="chart-center" id="t2" style="color:var(--success)">0</div></div>
      <h4 style="font-size:0.6rem; text-align:center; color:var(--text-muted);">LIVE ONLINE BY ROLE</h4>
      <div class="stat-list" id="l2"></div>
    </div>
    <div class="stat-card">
      <div class="chart-box"><canvas id="c3"></canvas></div>
      <h4 style="font-size:0.6rem; text-align:center; color:var(--text-muted);">SUB-BAGIAN (KOLOM J)</h4>
      <div class="stat-list" id="l3"></div>
    </div>
    <div class="stat-card">
      <div class="chart-box"><canvas id="c4"></canvas></div>
      <h4 style="font-size:0.6rem; text-align:center; color:var(--text-muted);">NEGARA</h4>
      <div class="stat-list" id="l4"></div>
    </div>
  </div>

  <div class="table-section">
    <div class="toolbar">
      <h3 style="font-weight:800; font-size:0.9rem;">MASTER DATABASE</h3>
      <input type="text" id="searchBox" class="search-input" placeholder="Search data...">
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Platform</th><th>Jabatan</th><th>Sub-Bagian</th><th>ID</th><th>Nama</th><th>Account</th><th>Masuk</th><th>Negara</th>
          </tr>
        </thead>
        <tbody id="mainBody"></tbody>
      </table>
    </div>
    <div style="padding:1rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#f8fafc;">
      <span id="pageTxt" style="font-size:0.7rem; font-weight:800; color:var(--text-muted);">PAGE 1</span>
      <div style="display:flex; gap:8px;">
        <button onclick="movePage(-1)" id="prevBtn" style="padding:6px 12px; border:1px solid var(--border); background:white; border-radius:6px; cursor:pointer; font-weight:800;">PREV</button>
        <button onclick="movePage(1)" id="nextBtn" style="padding:6px 12px; border:1px solid var(--border); background:white; border-radius:6px; cursor:pointer; font-weight:800;">NEXT</button>
      </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = []; let filtered = []; let page = 1; const size = 10; let charts = {};

  async function start() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      const lines = t.split(/\r?\n/).map(l => l.split(','));
      // Data Cleaning: Menghapus baris kosong dan membersihkan spasi
      db = lines.slice(1).filter(d => d[3] && d[3].trim() !== "").map(row => row.map(cell => cell.trim()));
      filtered = [...db];
      setInterval(sync, 1000);
      sync(); render();
    } catch (e) { console.error(e); }
  }

  function getAMT() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})); }

  function sync() {
    const amt = getAMT(); const h = amt.getHours(); const m = amt.getMinutes(); const totalM = h * 60 + m;
    document.getElementById('liveTime').innerText = amt.toLocaleTimeString('en-GB') + " AMT";

    let shifts = { Day: 0, Night: 0, Mid: 0 };
    let onlineJobs = {}; let subMap = {}; let geoMap = {}; let onTotal = 0;

    db.forEach(r => {
      // Indexing Fix: F=5, J=9, B=1, I=8
      const s = r[5] ? r[5].toLowerCase() : "";
      const job = r[1] || "Unknown";
      const sub = r[9] || "Unassigned";
      const geo = r[8] || "Unknown";

      // 1. Shift Counting
      if (s.includes('day')) shifts.Day++;
      else if (s.includes('night')) shifts.Night++;
      else if (s.includes('mid')) shifts.Mid++;

      // 2. Online Logic
      let on = false;
      if(s.includes('day') && (h>=4 && h<16)) on = true;
      else if(s.includes('night') && (h>=16 || h<4)) on = true;
      else if(s.includes('mid') && (totalM >= 570 && totalM < 1290)) on = true;

      if(on) { onTotal++; onlineJobs[job] = (onlineJobs[job] || 0) + 1; }
      subMap[sub] = (subMap[sub] || 0) + 1;
      geoMap[geo] = (geoMap[geo] || 0) + 1;
    });

    document.getElementById('t1').innerText = db.length;
    document.getElementById('t2').innerText = onTotal;

    const fillList = (id, obj, col) => {
      document.getElementById(id).innerHTML = Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([n,c]) => 
        `<div class="stat-item"><span>${n}</span><span class="val-badge" style="background:${col}">${c}</span></div>`).join('');
    };
    fillList('l1', shifts, '#2563eb'); fillList('l2', onlineJobs, '#10b981'); fillList('l3', subMap, '#8b5cf6'); fillList('l4', geoMap, '#f59e0b');

    draw('c1', shifts, ['#2563eb', '#1e293b', '#64748b']);
    draw('c2', onlineJobs, ['#10b981', '#34d399', '#059669']);
    draw('c3', subMap, ['#8b5cf6', '#a78bfa', '#c4b5fd']);
    draw('c4', geoMap, ['#f59e0b', '#fbbf24', '#d97706']);
  }

  function draw(id, dataObj, cols) {
    const ctx = document.getElementById(id).getContext('2d');
    const labels = Object.keys(dataObj); const vals = Object.values(dataObj);
    if (charts[id]) {
      charts[id].data.labels = labels; charts[id].data.datasets[0].data = vals; charts[id].update('none');
    } else {
      charts[id] = new Chart(ctx, { type: 'doughnut', data: { labels, datasets: [{ data: vals, backgroundColor: cols, borderWidth: 0 }] }, options: { plugins: { legend: { display: false } }, cutout: '75%', responsive: true }});
    }
  }

  function render() {
    const tbody = document.getElementById('mainBody'); const start = (page - 1) * size; const slice = filtered.slice(start, start + size);
    tbody.innerHTML = slice.map(r => `
      <tr>
        <td><b style="color:var(--accent)">${r[0]||'-'}</b></td>
        <td>${r[1]||'-'}</td>
        <td><span class="sub-tag">${r[9]||'-'}</span></td>
        <td style="opacity:0.6">#${r[2]||'-'}</td>
        <td style="font-weight:800; color:var(--primary)">${r[3]||'-'}</td>
        <td style="font-size:0.75rem; color:var(--text-muted)">${r[4]||'-'}</td>
        <td style="font-size:0.75rem">${r[6]||'-'}</td>
        <td><i class="fas fa-location-dot" style="font-size:0.6rem; color:var(--danger)"></i> ${r[8]||'-'}</td>
      </tr>`).join('');
    const totalP = Math.ceil(filtered.length / size);
    document.getElementById('pageTxt').innerText = `PAGE ${page} OF ${totalP || 1} (${filtered.length} STAFF)`;
    document.getElementById('prevBtn').disabled = page === 1; document.getElementById('nextBtn').disabled = page >= totalP;
  }

  function movePage(d) { page += d; render(); }
  document.getElementById('searchBox').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filtered = db.filter(r => r.some(c => c.toString().toLowerCase().includes(q)));
    page = 1; render();
  });
  start();
</script>
</body>
</html>
