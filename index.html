<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Karyawan Perusahaan</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --text-light: #ecf0f1;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            color: #333;
        }

        header {
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 2rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 2rem auto;
        }

        .search-container {
            margin-bottom: 2rem;
            text-align: right;
        }

        #searchInput {
            padding: 10px;
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        th {
            background-color: var(--secondary-color);
            color: white;
            text-align: left;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #e1f5fe;
            color: #0288d1;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Database Karyawan Perusahaan</h1>
    <p>Sistem Informasi Internal Terintegrasi</p>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama atau departemen...">
    </div>

    <div id="loader" class="loading">Memuat data karyawan...</div>

    <table id="employeeTable" style="display: none;">
        <thead>
            <tr id="tableHeader">
                </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<footer>
    &copy; 2024 Sistem Manajemen Perusahaan. Data diperbarui secara otomatis dari Google Drive.
</footer>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv';

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            processData(data);
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loader').innerHTML = 'Gagal memuat data. Pastikan publikasi Google Sheets aktif.';
        }
    }

    function processData(csvData) {
        const rows = csvData.split('\n').filter(row => row.trim() !== '');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        
        // Bersihkan konten sebelumnya
        tableHeader.innerHTML = '';
        tableBody.innerHTML = '';

        if (rows.length > 0) {
            // Buat Header
            const headers = rows[0].split(',');
            headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header.replace(/"/g, '');
                tableHeader.appendChild(th);
            });

            // Buat Baris Data
            for (let i = 1; i < rows.length; i++) {
                const columns = rows[i].split(',');
                const tr = document.createElement('tr');
                
                columns.forEach(col => {
                    const td = document.createElement('td');
                    td.textContent = col.replace(/"/g, '');
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            }

            // Tampilkan tabel, sembunyikan loader
            document.getElementById('loader').style.display = 'none';
            document.getElementById('employeeTable').style.display = 'table';
        }
    }

    function filterTable() {
        const input = document.getElementById("searchInput");
        const filter = input.value.toUpperCase();
        const table = document.getElementById("employeeTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            let visible = false;
            const td = tr[i].getElementsByTagName("td");
            for (let j = 0; j < td.length; j++) {
                if (td[j] && td[j].innerHTML.toUpperCase().indexOf(filter) > -1) {
                    visible = true;
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    }

    // Jalankan fungsi saat halaman dimuat
    fetchData();
</script>

</body>
</html>
