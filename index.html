<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus OS v2.2 | Data Analytics</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.08);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 24px; --radius-md: 12px;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.8);
      backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
      padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.3rem; }
    .brand i { color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 5rem; }

    .sub-nav {
      display: flex; gap: 8px; margin: 2rem 0; padding: 6px;
      background: #e2e8f0; border-radius: 18px; width: fit-content;
    }
    .nav-btn {
      padding: 12px 24px; border: none; background: transparent;
      border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
      color: var(--text-muted); transition: all 0.3s;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-btn.active { background: white; color: var(--accent); box-shadow: var(--shadow); }

    .section-content { display: none; animation: fadeIn 0.4s ease-out; }
    .section-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .glass-card {
      background: var(--card-bg); border-radius: var(--radius-xl);
      border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
    }
    .toolbar { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    
    .table-wrapper { overflow-x: auto; width: 100%; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1100px; }
    th { background: #f8fafc; padding: 1.2rem 1rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; border-bottom: 2px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Chart Container */
    .chart-box {
      max-width: 450px; margin: 0 auto; padding: 20px;
    }

    .badge { padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
    .bg-blue { background: var(--accent-soft); color: var(--accent); }
    .bg-green { background: #dcfce7; color: #15803d; }
  </style>
</head>
<body>

  <nav>
    <div class="brand"><i class="fas fa-chart-pie"></i> NEXUS<span>ANALYTICS</span></div>
    <div id="status" style="font-size: 0.8rem; font-weight: 700; color: var(--success);">SYNCING...</div>
  </nav>

  <div class="container">
    <div class="sub-nav">
      <button class="nav-btn active" onclick="switchTab('overview', this)"><i class="fas fa-list"></i> Overview</button>
      <button class="nav-btn" onclick="switchTab('stats', this)"><i class="fas fa-globe"></i> Geo-Stats</button>
      <button class="nav-btn" onclick="switchTab('shifting', this)"><i class="fas fa-clock"></i> Shifting</button>
    </div>

    <div id="overview" class="section-content active">
      <div class="glass-card">
        <div class="toolbar">
          <h3 style="font-weight: 800;">Master Database</h3>
          <input type="text" id="searchInput" style="padding:10px 15px; border-radius:10px; border:1px solid var(--border);" placeholder="Cari data...">
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th style="width: 100px;">Platform</th>
                <th style="width: 150px;">Jabatan</th>
                <th style="width: 80px;">ID</th>
                <th style="width: 220px;">Nama</th>
                <th style="width: 120px;">Negara</th>
                <th style="width: 100px;">Status</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="stats" class="section-content">
      <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 2rem;">
        <div class="glass-card" style="padding: 2rem; text-align: center;">
          <h3 style="margin-bottom: 2rem; font-weight: 800;">Distribusi Negara Staff</h3>
          <div class="chart-box">
            <canvas id="countryChart"></canvas>
          </div>
        </div>
        <div class="glass-card" style="padding: 2rem;">
          <h3 style="margin-bottom: 1.5rem; font-weight: 800;">Rincian Total</h3>
          <div id="countryList" style="display: flex; flex-direction: column; gap: 15px;">
            </div>
        </div>
      </div>
    </div>

    <div id="shifting" class="section-content">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div class="glass-card" style="padding: 1.5rem;"><h3><i class="fas fa-sun"></i> Day Shift</h3><div id="dayList"></div></div>
        <div class="glass-card" style="padding: 1.5rem;"><h3><i class="fas fa-moon"></i> Night Shift</h3><div id="nightList"></div></div>
      </div>
    </div>

  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
    let masterData = [];
    let myChart = null;

    async function init() {
      const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const text = await res.text();
      const rows = text.split('\n').map(r => r.split(',')).filter(r => r.length > 5);
      masterData = rows.slice(1);
      
      document.getElementById('status').innerText = `TOTAL: ${masterData.length} STAFF`;
      
      renderOverview(masterData);
      updateChart();
      renderShifting();
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function renderOverview(data) {
      document.getElementById('tableBody').innerHTML = data.map(r => `
        <tr>
          <td><span class="badge bg-blue">${r[0]}</span></td>
          <td style="font-weight:700;">${r[1]}</td>
          <td>#${r[2]}</td>
          <td style="font-weight:700;">${r[3]}</td>
          <td><b>${r[8] || 'Unknown'}</b></td>
          <td><span class="badge ${r[9].toLowerCase().includes('aktif')?'bg-green':''}">${r[9]}</span></td>
        </tr>
      `).join('');
    }

    function updateChart() {
      const counts = {};
      masterData.forEach(r => {
        const country = (r[8] || 'Unknown').trim();
        counts[country] = (counts[country] || 0) + 1;
      });

      const labels = Object.keys(counts);
      const values = Object.values(counts);

      // Render Chart
      const ctx = document.getElementById('countryChart').getContext('2d');
      if (myChart) myChart.destroy();
      
      myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'],
            borderWidth: 5,
            hoverOffset: 20
          }]
        },
        options: {
          plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', weight: 'bold' } } } },
          cutout: '70%'
        }
      });

      // Render Side List
      document.getElementById('countryList').innerHTML = labels.map((l, i) => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--border);">
          <span style="font-weight:700;"><i class="fas fa-flag" style="color:#2563eb; margin-right:8px;"></i> ${l}</span>
          <span class="badge bg-blue">${values[i]} Staff</span>
        </div>
      `).join('');
    }

    function renderShifting() {
      const day = masterData.filter(r => r[5].toLowerCase().includes('day'));
      const night = masterData.filter(r => r[5].toLowerCase().includes('night'));
      const card = (r) => `<div style="padding:10px; margin-top:5px; background:var(--bg); border-radius:8px;"><b>${r[3]}</b> - ${r[1]}</div>`;
      document.getElementById('dayList').innerHTML = day.map(card).join('');
      document.getElementById('nightList').innerHTML = night.map(card).join('');
    }

    init();
  </script>
</body>
</html>
