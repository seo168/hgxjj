<script>
  const navLinks = document.querySelectorAll('.nav a');
  const sections = [...navLinks].map(link => document.querySelector(link.getAttribute('href')));

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(link =>
          link.classList.toggle('active', link.getAttribute('href') === `#${entry.target.id}`)
        );
      }
    });
  }, { threshold: 0.5 });

  sections.forEach(section => section && observer.observe(section));

  const EMPLOYEE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  const EMPLOYEE_PAGE_SIZE = 10;

  let employeeDataRows = [];
  let employeeCurrentPage = 1;
  let employeeHeaders = [];

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = '';
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const next = text[i + 1];

      if (char === '"') {
        if (insideQuotes && next === '"') {
          cell += '"';
          i++;
        } else {
          insideQuotes = !insideQuotes;
        }
      } else if (char === ',' && !insideQuotes) {
        row.push(cell);
        cell = '';
      } else if ((char === '\n' || char === '\r') && !insideQuotes) {
        if (char === '\r' && next === '\n') i++;
        row.push(cell);
        if (row.some(v => String(v).trim() !== '')) rows.push(row);
        row = [];
        cell = '';
      } else {
        cell += char;
      }
    }

    if (cell.length || row.length) {
      row.push(cell);
      if (row.some(v => String(v).trim() !== '')) rows.push(row);
    }

    return rows;
  }

  function renderEmployeeRows(rows) {
    const tbody = document.getElementById('employeeTableBody');
    const totalEmployees = document.getElementById('totalEmployees');
    if (!tbody) return;

    if (!rows.length || rows.length === 1) {
      employeeHeaders = [];
      employeeDataRows = [];
      employeeCurrentPage = 1;
      tbody.innerHTML = '<tr><td colspan="10">Belum ada data.</td></tr>';
      if (totalEmployees) totalEmployees.textContent = '0';
      updateEmployeePagination();
      return;
    }

    employeeHeaders = rows[0].map(h => String(h).trim());
    employeeDataRows = rows.slice(1).filter(r => r.some(cell => String(cell || '').trim() !== ''));
    employeeCurrentPage = 1;

    if (totalEmployees) {
      totalEmployees.textContent = employeeDataRows.length.toLocaleString('en-US');
    }

    drawEmployeePage();
  }

  function drawEmployeePage() {
    const tbody = document.getElementById('employeeTableBody');
    if (!tbody) return;

    tbody.innerHTML = '';

    if (!employeeDataRows.length) {
      tbody.innerHTML = '<tr><td colspan="10">Belum ada data.</td></tr>';
      updateEmployeePagination();
      return;
    }

    const start = (employeeCurrentPage - 1) * EMPLOYEE_PAGE_SIZE;
    const pageRows = employeeDataRows.slice(start, start + EMPLOYEE_PAGE_SIZE);

    const getIdx = (...names) =>
      employeeHeaders.findIndex(h =>
        names.map(n => n.toLowerCase()).includes(String(h).toLowerCase())
      );

    const idxPan = getIdx('盘口');
    const idxPos = getIdx('岗位');
    const idxId = getIdx('ID', 'id');
    const idxName = getIdx('姓名', 'name');
    const idxBack = getIdx('后台账号');
    const idxShift = getIdx('班次', 'shift');
    const idxJoin = getIdx('入职日期');
    const idxTime = getIdx('工作时间');
    const idxCountry = getIdx('国家', 'country', '国家 / Country');
    const idxStatus = getIdx('状态', 'status');

    pageRows.forEach(r => {
      const tr = document.createElement('tr');
      const values = [
        idxPan >= 0 ? r[idxPan] || '' : '',
        idxPos >= 0 ? r[idxPos] || '' : '',
        idxId >= 0 ? r[idxId] || '' : '',
        idxName >= 0 ? r[idxName] || '' : '',
        idxBack >= 0 ? r[idxBack] || '' : '',
        idxShift >= 0 ? r[idxShift] || '' : '',
        idxJoin >= 0 ? r[idxJoin] || '' : '',
        idxTime >= 0 ? r[idxTime] || '' : '',
        idxCountry >= 0 ? r[idxCountry] || '' : '',
        idxStatus >= 0 ? r[idxStatus] || '' : ''
      ];

      values.forEach((val, i) => {
        const td = document.createElement('td');

        if (i === 0 && val) {
          td.innerHTML = `<span class="tag tag-blue">${val}</span>`;
        } else if (i === 9 && val) {
          const cls = String(val).toLowerCase().includes('active') ? 'tag-green' : 'tag-gray';
          td.innerHTML = `<span class="tag ${cls}">${val}</span>`;
        } else {
          td.textContent = val;
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    updateEmployeePagination();
  }

  function updateEmployeePagination() {
    const total = employeeDataRows.length;
    const totalPages = Math.max(1, Math.ceil(total / EMPLOYEE_PAGE_SIZE));
    const start = total === 0 ? 0 : ((employeeCurrentPage - 1) * EMPLOYEE_PAGE_SIZE) + 1;
    const end = Math.min(employeeCurrentPage * EMPLOYEE_PAGE_SIZE, total);

    const info = document.getElementById('employeePageInfo');
    const pagination = document.getElementById('employeePagination');

    if (info) {
      info.textContent = total === 0
        ? 'Menampilkan 0 data'
        : `Menampilkan ${start}-${end} dari ${total} data`;
    }

    if (!pagination) return;
    pagination.innerHTML = '';

    if (total === 0) return;

    const maxButtons = Math.min(totalPages, 1000);
    let pageStart = Math.max(1, employeeCurrentPage - 4);
    let pageEnd = Math.min(maxButtons, pageStart + 9);
    pageStart = Math.max(1, pageEnd - 9);

    const makeBtn = (label, page, active = false) => {
      const btn = document.createElement('button');
      btn.className = active ? 'btn btn-primary' : 'btn btn-secondary';
      btn.textContent = label;
      btn.style.padding = '10px 14px';
      btn.style.minWidth = '44px';
      btn.disabled = active;
      btn.addEventListener('click', () => {
        employeeCurrentPage = page;
        drawEmployeePage();
      });
      return btn;
    };

    if (employeeCurrentPage > 1) {
      pagination.appendChild(makeBtn('‹', employeeCurrentPage - 1));
    }

    if (pageStart > 1) {
      pagination.appendChild(makeBtn('1', 1, employeeCurrentPage === 1));
      if (pageStart > 2) {
        const dots = document.createElement('div');
        dots.className = 'fake-input';
        dots.style.minWidth = 'auto';
        dots.style.padding = '10px 12px';
        dots.textContent = '...';
        pagination.appendChild(dots);
      }
    }

    for (let i = pageStart; i <= pageEnd; i++) {
      pagination.appendChild(makeBtn(String(i), i, i === employeeCurrentPage));
    }

    if (pageEnd < maxButtons) {
      if (pageEnd < maxButtons - 1) {
        const dots = document.createElement('div');
        dots.className = 'fake-input';
        dots.style.minWidth = 'auto';
        dots.style.padding = '10px 12px';
        dots.textContent = '...';
        pagination.appendChild(dots);
      }
      pagination.appendChild(makeBtn(String(maxButtons), maxButtons, employeeCurrentPage === maxButtons));
    }

    if (employeeCurrentPage < totalPages && employeeCurrentPage < 1000) {
      pagination.appendChild(makeBtn('›', employeeCurrentPage + 1));
    }
  }

  async function loadEmployeeData() {
    try {
      const url = EMPLOYEE_CSV_URL + '&t=' + Date.now();
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('Gagal ambil data');
      const text = await res.text();
      const rows = parseCSV(text);
      renderEmployeeRows(rows);
    } catch (err) {
      console.error(err);
      const tbody = document.getElementById('employeeTableBody');
      if (tbody) {
        tbody.innerHTML = '<tr><td colspan="10">Data karyawan gagal dimuat. Periksa link CSV Google Sheets.</td></tr>';
      }
    }
  }

  loadEmployeeData();
</script>
