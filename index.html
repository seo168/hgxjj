<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise HR Portal | Real-Time Data</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Layout */
    .navbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
    }

    .nav-content {
      max-width: 1400px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 1.2rem; color: var(--primary); text-decoration: none;
    }

    .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem; margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface); padding: 1.25rem;
      border-radius: var(--radius); border: 1px solid var(--border);
      box-shadow: var(--shadow); display: flex; align-items: center; gap: 1rem;
    }

    .stat-icon {
      width: 45px; height: 45px; border-radius: 10px;
      display: grid; place-items: center; background: #eff6ff; color: var(--primary);
    }

    /* Data Table Card */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }

    .card-header {
      padding: 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }

    .search-box {
      position: relative; width: 100%; max-width: 350px;
    }

    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    
    .search-input {
      width: 100%; padding: 10px 10px 10px 38px; border: 1px solid var(--border);
      border-radius: 8px; outline: none; font-family: inherit;
    }

    /* Table Fixing */
    .table-container { overflow-x: auto; width: 100%; }

    table {
      width: 100%; border-collapse: collapse;
      table-layout: fixed; /* MENGUNCI UKURAN TABEL */
      min-width: 1100px; /* Minimal lebar agar tidak gepeng */
    }

    th {
      background: #f1f5f9; padding: 12px 15px;
      font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);
      text-align: left; border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 15px; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; vertical-align: middle;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; /* Titik-titik jika kepanjangan */
    }

    /* Atur Lebar Kolom Secara Manual (%) */
    .col-platform { width: 100px; }
    .col-posisi { width: 120px; }
    .col-id { width: 90px; }
    .col-nama { width: 200px; }
    .col-user { width: 150px; }
    .col-shift { width: 110px; }
    .col-tgl { width: 130px; }
    .col-negara { width: 120px; }
    .col-status { width: 100px; }

    tr:hover { background: #f8fafc; }

    /* Badge */
    .badge {
      padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
      display: inline-block;
    }
    .bg-blue { background: #dbeafe; color: #1e40af; }
    .bg-green { background: #dcfce7; color: #15803d; }
    .bg-gray { background: #f1f5f9; color: #475569; }

    /* Footer & Pagination */
    .card-footer {
      padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
    }

    .btn-page {
      padding: 6px 14px; border: 1px solid var(--border); background: white;
      border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600;
    }
    .btn-page:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-page:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: 1fr; }
      .card-header { flex-direction: column; align-items: flex-start; }
      .search-box { max-width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-content">
      <a href="#" class="logo"><i class="fas fa-id-badge"></i> HR CLOUD SYSTEM</a>
      <div style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">
        <i class="fas fa-circle" style="color: #10b981; font-size: 0.6rem;"></i> Connected to Database
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-user-friends"></i></div>
        <div>
          <div style="font-size: 0.8rem; color: var(--text-muted);">Total Anggota</div>
          <div id="count-total" style="font-size: 1.4rem; font-weight: 800;">0</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fff7ed; color:#ea580c;"><i class="fas fa-clock"></i></div>
        <div>
          <div style="font-size: 0.8rem; color: var(--text-muted);">Status Shift</div>
          <div style="font-size: 1.1rem; font-weight: 700;">Day / Night</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f0fdf4; color:#16a34a;"><i class="fas fa-sync-alt"></i></div>
        <div>
          <div style="font-size: 0.8rem; color: var(--text-muted);">Sinkronisasi</div>
          <div style="font-size: 1.1rem; font-weight: 700;">Real-time</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h2 style="margin:0; font-size: 1.1rem;">Database Karyawan</h2>
          <p style="margin:4px 0 0; font-size: 0.8rem; color: var(--text-muted);">Kelola informasi seluruh staf melalui satu pintu</p>
        </div>
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Cari Nama, ID, atau Platform...">
        </div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="col-platform">Platform</th>
              <th class="col-posisi">Posisi</th>
              <th class="col-id">ID</th>
              <th class="col-nama">Nama Lengkap</th>
              <th class="col-user">Username</th>
              <th class="col-shift">Shift</th>
              <th class="col-tgl">Tgl Masuk</th>
              <th class="col-negara">Negara</th>
              <th class="col-status">Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="9" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                <i class="fas fa-spinner fa-spin"></i> Menghubungkan ke Google Sheets...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer">
        <div id="pageInfo" style="font-size: 0.85rem; color: var(--text-muted);">Menampilkan 0 data</div>
        <div style="display: flex; gap: 8px;">
          <button id="btnPrev" class="btn-page"><i class="fas fa-arrow-left"></i></button>
          <button id="btnNext" class="btn-page"><i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
    const ITEMS_PER_PAGE = 12;
    
    let rawData = [];
    let displayData = [];
    let currentPage = 1;

    async function init() {
      try {
        const res = await fetch(SHEET_URL + '&t=' + new Date().getTime());
        const csv = await res.text();
        const rows = parseCSV(csv);
        
        if (rows.length > 1) {
          rawData = rows.slice(1).filter(r => r.length > 1); // Skip header & empty rows
          displayData = [...rawData];
          document.getElementById('count-total').innerText = rawData.length;
          render();
        }
      } catch (err) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" style="text-align:center; color:red;">Gagal memuat data! Pastikan link CSV benar.</td></tr>';
      }
    }

    function parseCSV(str) {
      const arr = [];
      let quote = false;
      let col = "", row = [];
      for (let c = 0; c < str.length; c++) {
        let char = str[c], next = str[c+1];
        if (char == '"' && quote && next == '"') { col += char; c++; continue; }
        if (char == '"') { quote = !quote; continue; }
        if (char == ',' && !quote) { row.push(col); col = ""; continue; }
        if (char == '\n' && !quote) { row.push(col); arr.push(row); col = ""; row = []; continue; }
        col += char;
      }
      row.push(col); arr.push(row);
      return arr;
    }

    function render() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageItems = displayData.slice(start, end);

      if (pageItems.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:2rem;">Data tidak ditemukan...</td></tr>';
      }

      pageItems.forEach(item => {
        const tr = document.createElement('tr');
        const statusStr = (item[9] || '-').toLowerCase();
        const statusBadge = statusStr.includes('aktif') ? 'bg-green' : 'bg-gray';

        tr.innerHTML = `
          <td><span class="badge bg-blue">${item[0] || '-'}</span></td>
          <td>${item[1] || '-'}</td>
          <td style="font-weight:600;">#${item[2] || '-'}</td>
          <td style="font-weight:500; color:var(--text-main);">${item[3] || '-'}</td>
          <td style="font-family:monospace; color:var(--primary);">${item[4] || '-'}</td>
          <td>${item[5] || '-'}</td>
          <td>${item[6] || '-'}</td>
          <td>${item[8] || '-'}</td>
          <td><span class="badge ${statusBadge}">${item[9] || '-'}</span></td>
        `;
        tbody.appendChild(tr);
      });

      // Update Info
      const total = displayData.length;
      document.getElementById('pageInfo').innerText = `Menampilkan ${total ? start + 1 : 0} - ${Math.min(end, total)} dari ${total} Anggota`;
      document.getElementById('btnPrev').disabled = currentPage === 1;
      document.getElementById('btnNext').disabled = currentPage >= Math.ceil(total / ITEMS_PER_PAGE);
    }

    // Search Feature
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const val = e.target.value.toLowerCase();
      displayData = rawData.filter(row => 
        row.some(cell => cell.toLowerCase().includes(val))
      );
      currentPage = 1;
      render();
    });

    document.getElementById('btnPrev').onclick = () => { if(currentPage > 1) { currentPage--; render(); } };
    document.getElementById('btnNext').onclick = () => { if(currentPage < Math.ceil(displayData.length/ITEMS_PER_PAGE)) { currentPage++; render(); } };

    init();
  </script>
</body>
</html>
