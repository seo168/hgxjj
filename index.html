<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Master v3.2 | Dept Focused</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }

    .container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
    
    /* 4 Special Dept Cards */
    .dept-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
    .dept-card { background: white; padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .dept-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; }
    
    /* Color coding */
    .card-withdraw::before { background: var(--withdraw); }
    .card-cs::before { background: var(--cs); }
    .card-finance::before { background: var(--finance); }
    .card-shift::before { background: var(--accent); }

    .chart-box { width: 100px; height: 100px; margin: 0 auto 10px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.9rem; }
    
    .dept-title { text-align: center; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; color: var(--text-muted); letter-spacing: 1px; }
    .stat-list { max-height: 120px; overflow-y: auto; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 700; }
    .badge { padding: 2px 8px; border-radius: 10px; color: white; font-size: 0.65rem; }

    /* Table Customization */
    .table-container { background: white; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .table-header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .search-input { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border); width: 400px; outline: none; font-weight: 600; }
    
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; }

    /* Custom Tags for Table */
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 6px; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 4px 10px; border-radius: 6px; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 4px 10px; border-radius: 6px; }
    
    .geo-mini { font-size: 0.65rem; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; color: var(--text-muted); }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900; color: var(--primary); font-size: 1.2rem;">DEPT<span>RADAR</span></div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card card-withdraw">
      <div class="dept-title">Withdrawal (出款)</div>
      <div class="chart-box"><canvas id="chartWD"></canvas><div class="chart-val" id="totalWD">0</div></div>
      <div class="stat-list" id="listWD"></div>
    </div>

    <div class="dept-card card-cs">
      <div class="dept-title">Customer Service (客服)</div>
      <div class="chart-box"><canvas id="chartCS"></canvas><div class="chart-val" id="totalCS">0</div></div>
      <div class="stat-list" id="listCS"></div>
    </div>

    <div class="dept-card card-finance">
      <div class="dept-title">Finance (财务)</div>
      <div class="chart-box"><canvas id="chartFN"></canvas><div class="chart-val" id="totalFN">0</div></div>
      <div class="stat-list" id="listFN"></div>
    </div>

    <div class="dept-card card-shift">
      <div class="dept-title">Shift Distribution</div>
      <div class="chart-box"><canvas id="chartSH"></canvas><div class="chart-val" id="totalGlobal">0</div></div>
      <div class="stat-list" id="listSH"></div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <h3 style="font-weight: 800;">Master Personnel Tracking</h3>
      <input type="text" id="mainSearch" class="search-input" placeholder="Cari berdasarkan departemen, nama, atau ID...">
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Platform</th>
            <th>Master Dept</th>
            <th>Sub-Bagian (J)</th>
            <th>ID</th>
            <th>Nama Staff</th>
            <th>Account</th>
            <th>Join Date</th>
            <th>Info</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div style="padding: 1.2rem; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border);">
      <span id="pageTxt" style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted);">PAGE 1</span>
      <div style="display:flex; gap:10px;">
        <button onclick="changePage(-1)" id="btnPrev" style="padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:white; font-weight:800; cursor:pointer;">PREV</button>
        <button onclick="changePage(1)" id="btnNext" style="padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:white; font-weight:800; cursor:pointer;">NEXT</button>
      </div>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  
  let db = []; let filtered = []; let page = 1; const size = 10; let charts = {};

  async function loadData() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      const lines = t.split(/\r?\n/).map(l => l.split(','));
      db = lines.slice(1).filter(d => d[3] && d[3].trim() !== "").map(row => row.map(c => c.trim()));
      filtered = [...db];
      setInterval(sync, 1000); sync(); render();
    } catch (e) { console.error(e); }
  }

  function getAMT() { return new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})); }

  function sync() {
    const amt = getAMT(); document.getElementById('clock').innerText = amt.toLocaleTimeString('en-GB') + " AMT";
    
    let wdObj = {}, csObj = {}, fnObj = {}, shObj = { Day: 0, Night: 0, Mid: 0 };
    let wdT = 0, csT = 0, fnT = 0;

    db.forEach(r => {
      const dept = (r[1] || '').toLowerCase();
      const sub = (r[9] || 'Lainnya');
      const shift = (r[5] || '').toLowerCase();
      
      // 1. Withdrawal Filter (出款)
      if (dept.includes('出款') || sub.includes('出款')) {
        wdT++; wdObj[sub] = (wdObj[sub] || 0) + 1;
      }
      // 2. Customer Service Filter (客服)
      else if (dept.includes('客服') || sub.includes('客服')) {
        csT++; csObj[sub] = (csObj[sub] || 0) + 1;
      }
      // 3. Finance Filter (财务)
      else if (dept.includes('财务') || sub.includes('财务')) {
        fnT++; fnObj[sub] = (fnObj[sub] || 0) + 1;
      }

      // Global Shift
      if (shift.includes('day')) shObj.Day++;
      else if (shift.includes('night')) shObj.Night++;
      else if (shift.includes('mid')) shObj.Mid++;
    });

    document.getElementById('totalWD').innerText = wdT;
    document.getElementById('totalCS').innerText = csT;
    document.getElementById('totalFN').innerText = fnT;
    document.getElementById('totalGlobal').innerText = db.length;

    const renderList = (id, obj, color) => {
      document.getElementById(id).innerHTML = Object.entries(obj).sort((a,b)=>b[1]-a[1]).map(([n,c]) => 
        `<div class="stat-row"><span>${n}</span><span class="badge" style="background:${color}">${c}</span></div>`).join('');
    };

    renderList('listWD', wdObj, 'var(--withdraw)');
    renderList('listCS', csObj, 'var(--cs)');
    renderList('listFN', fnObj, 'var(--finance)');
    renderList('listSH', shObj, 'var(--accent)');

    drawChart('chartWD', wdObj, ['#10b981', '#34d399', '#059669', '#6ee7b7']);
    drawChart('chartCS', csObj, ['#8b5cf6', '#a78bfa', '#c4b5fd', '#ddd6fe']);
    drawChart('chartFN', fnObj, ['#f59e0b', '#fbbf24', '#d97706', '#fcd34d']);
    drawChart('chartSH', shObj, ['#2563eb', '#1e293b', '#64748b']);
  }

  function drawChart(id, data, colors) {
    const ctx = document.getElementById(id).getContext('2d');
    if (charts[id]) {
      charts[id].data.labels = Object.keys(data);
      charts[id].data.datasets[0].data = Object.values(data);
      charts[id].update('none');
    } else {
      charts[id] = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: colors, borderWidth: 0 }] },
        options: { plugins: { legend: { display: false } }, cutout: '78%', responsive: true }
      });
    }
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    const slice = filtered.slice((page-1)*size, page*size);
    tbody.innerHTML = slice.map(r => {
      const d = r[1] || ''; const s = r[9] || '';
      let cls = ''; 
      if(d.includes('出款') || s.includes('出款')) cls = 'tag-wd';
      else if(d.includes('客服') || s.includes('客服')) cls = 'tag-cs';
      else if(d.includes('财务') || s.includes('财务')) cls = 'tag-fn';

      return `<tr>
        <td><b style="color:var(--accent)">${r[0]}</b></td>
        <td><span class="${cls}">${r[1]}</span></td>
        <td><span style="font-weight:800">${r[9]||'-'}</span></td>
        <td style="opacity:0.6">#${r[2]}</td>
        <td style="font-weight:800; font-size:0.85rem;">${r[3]}</td>
        <td style="font-size:0.75rem; color:var(--text-muted)">${r[4]}</td>
        <td style="font-size:0.75rem;">${r[6]}</td>
        <td><span class="geo-mini">${r[8]}</span></td>
      </tr>`;
    }).join('');
    
    const totalP = Math.ceil(filtered.length / size);
    document.getElementById('pageTxt').innerText = `PAGE ${page} OF ${totalP || 1} (${filtered.length} RECORDS)`;
    document.getElementById('btnPrev').disabled = page === 1;
    document.getElementById('btnNext').disabled = page >= totalP;
  }

  function changePage(d) { page += d; render(); }
  document.getElementById('mainSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filtered = db.filter(r => r.some(c => c.toLowerCase().includes(q)));
    page = 1; render();
  });

  loadData();
</script>
</body>
</html>
