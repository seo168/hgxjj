<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus OS v2 | Enterprise Intelligence</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --accent-soft: rgba(37, 99, 235, 0.08);
      --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --bg: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0;
      --text-main: #1e293b; --text-muted: #64748b;
      --radius-xl: 24px; --radius-md: 12px;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }

    /* --- Navigation --- */
    nav {
      position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.8);
      backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
      padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.3rem; }
    .brand i { color: var(--accent); }

    /* --- Sub-Navigation (Buttons) --- */
    .sub-nav {
      display: flex; gap: 10px; margin: 2rem 0; padding: 5px;
      background: #e2e8f0; border-radius: 16px; width: fit-content;
    }
    .nav-btn {
      padding: 10px 20px; border: none; background: transparent;
      border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem;
      color: var(--text-muted); transition: all 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .nav-btn.active { background: white; color: var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

    /* --- Layout --- */
    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 5rem; }
    .section-content { display: none; animation: fadeIn 0.4s ease-out; }
    .section-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- Cards & Tables --- */
    .glass-card {
      background: var(--card-bg); border-radius: var(--radius-xl);
      border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden;
    }
    .toolbar { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); }
    
    /* Custom table styles similar to previous version */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; }
    th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Performance Bars */
    .perf-bar { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; width: 100px; }
    .perf-fill { height: 100%; background: var(--accent); }

    .search-input {
      padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); outline: none; width: 300px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand"><i class="fas fa-microchip"></i> NEXUS<span>OS</span></div>
    <div style="font-size: 0.8rem; font-weight: 700; color: var(--success);"><i class="fas fa-circle"></i> SYSTEM ONLINE</div>
  </nav>

  <div class="container">
    <div class="sub-nav">
      <button class="nav-btn active" onclick="switchTab('overview', this)"><i class="fas fa-th-large"></i> Overview</button>
      <button class="nav-btn" onclick="switchTab('shifting', this)"><i class="fas fa-clock"></i> Shifting</button>
      <button class="nav-btn" onclick="switchTab('performance', this)"><i class="fas fa-chart-line"></i> Performance</button>
      <button class="nav-btn" onclick="switchTab('docs', this)"><i class="fas fa-file-medical"></i> Documents</button>
    </div>

    <div id="overview" class="section-content active">
      <div class="glass-card">
        <div class="toolbar">
          <h3 style="font-weight: 800;">Database Master</h3>
          <input type="text" class="search-input" placeholder="Cari data...">
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th style="width: 150px;">Nama</th>
                <th style="width: 100px;">Platform</th>
                <th style="width: 150px;">Jabatan</th>
                <th style="width: 120px;">Username</th>
                <th style="width: 100px;">Status</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="shifting" class="section-content">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div class="glass-card" style="padding: 2rem;">
          <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-sun text-warning"></i> Day Shift (08:00 - 20:00)</h3>
          <div id="dayList" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
        </div>
        <div class="glass-card" style="padding: 2rem;">
          <h3 style="margin-bottom: 1.5rem;"><i class="fas fa-moon text-primary"></i> Night Shift (20:00 - 08:00)</h3>
          <div id="nightList" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
        </div>
      </div>
    </div>

    <div id="performance" class="section-content">
      <div class="glass-card" style="padding: 2rem;">
        <h3 style="margin-bottom: 2rem;">Analisis Kinerja Tim</h3>
        <div id="perfTable" class="table-wrapper">
          </div>
      </div>
    </div>

    <div id="docs" class="section-content">
        <div class="stats-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;">
            <div class="glass-card" style="padding: 1.5rem; text-align:center;">
                <i class="fas fa-file-pdf" style="font-size: 2rem; color: var(--danger);"></i>
                <h4 style="margin-top:1rem;">SOP Perusahaan</h4>
                <button class="nav-btn" style="margin: 1rem auto; background: var(--bg);">Buka</button>
            </div>
            <div class="glass-card" style="padding: 1.5rem; text-align:center;">
                <i class="fas fa-file-excel" style="font-size: 2rem; color: var(--success);"></i>
                <h4 style="margin-top:1rem;">Laporan Gaji</h4>
                <button class="nav-btn" style="margin: 1rem auto; background: var(--bg);">Buka</button>
            </div>
            <div class="glass-card" style="padding: 1.5rem; text-align:center;">
                <i class="fas fa-shield-halved" style="font-size: 2rem; color: var(--accent);"></i>
                <h4 style="margin-top:1rem;">Kebijakan Keamanan</h4>
                <button class="nav-btn" style="margin: 1rem auto; background: var(--bg);">Buka</button>
            </div>
        </div>
    </div>

  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
    let masterData = [];

    async function init() {
      const res = await fetch(CSV_URL);
      const csv = await res.text();
      masterData = csv.split('\n').slice(1).map(row => row.split(',')).filter(r => r.length > 2);
      renderOverview();
      renderShifting();
      renderPerformance();
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      btn.classList.add('active');
    }

    function renderOverview() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = masterData.map(r => `
        <tr>
          <td style="font-weight:700;">${r[3]}</td>
          <td><span style="padding:4px 8px; background:var(--accent-soft); border-radius:6px; font-size:0.7rem; color:var(--accent); font-weight:800;">${r[0]}</span></td>
          <td>${r[1]}</td>
          <td style="color:var(--accent); font-family:monospace;">${r[4]}</td>
          <td><span style="color:${r[9].toLowerCase().includes('aktif') ? 'var(--success)' : 'var(--text-muted)'}; font-weight:800;">● ${r[9]}</span></td>
        </tr>
      `).join('');
    }

    function renderShifting() {
      const dayList = document.getElementById('dayList');
      const nightList = document.getElementById('nightList');
      
      const dayData = masterData.filter(r => r[5].toLowerCase().includes('day'));
      const nightData = masterData.filter(r => r[5].toLowerCase().includes('night'));

      const itemHTML = (r) => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--bg); border-radius:10px; border-left:4px solid var(--accent);">
          <span style="font-weight:600;">${r[3]}</span>
          <span style="font-size:0.75rem; color:var(--text-muted);">${r[1]}</span>
        </div>
      `;

      dayList.innerHTML = dayData.map(itemHTML).join('');
      nightList.innerHTML = nightData.map(itemHTML).join('');
    }

    function renderPerformance() {
      const container = document.getElementById('perfTable');
      // Simulasi Skor Performa Random (Karena di sheet mungkin belum ada kolom skor)
      container.innerHTML = `
        <table>
          <thead><tr><th>Karyawan</th><th>Kapasitas Kerja</th><th>Skor</th></tr></thead>
          <tbody>
            ${masterData.slice(0, 10).map(r => {
              const score = Math.floor(Math.random() * (95 - 70 + 1) + 70);
              return `
                <tr>
                  <td><b>${r[3]}</b></td>
                  <td><div class="perf-bar"><div class="perf-fill" style="width:${score}%"></div></div></td>
                  <td><b style="color:var(--accent)">${score}%</b></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    init();
  </script>
</body>
</html>
