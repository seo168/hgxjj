<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus v6.5 | 10 Rows & Date Fixed</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root {
      --primary: #0f172a; --accent: #2563eb; --border: #e2e8f0;
      --withdraw: #10b981; --cs: #8b5cf6; --finance: #f59e0b; --country: #f43f5e;
      --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
    nav { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; }
    .amt-clock { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; }
    .container { max-width: 1600px; margin: 0 auto; padding: 1.5rem; }
    
    /* Stats */
    .dept-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .dept-card { background: white; padding: 1.2rem; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
    .chart-box { width: 80px; height: 80px; margin: 0 auto 10px; position: relative; }
    .chart-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 0.8rem; }
    .dept-title { font-size: 0.7rem; font-weight: 800; margin-bottom: 12px; text-transform: uppercase; }

    /* Filters */
    .filter-wrapper { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 1rem; }
    .filter-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
    .filter-group label { display: block; font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
    .filter-group select, .filter-group input { width: 100%; padding: 11px 16px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; outline: none; }

    /* Table */
    .table-container { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f8fafc; padding: 1rem; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 0.9rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; text-align: center; }
    
    .tag-wd { background: #ecfdf5; color: #065f46; padding: 4px 10px; border-radius: 6px; }
    .tag-cs { background: #f5f3ff; color: #5b21b6; padding: 4px 10px; border-radius: 6px; }
    .tag-fn { background: #fffbeb; color: #92400e; padding: 4px 10px; border-radius: 6px; }
    
    /* Date Styling */
    .date-badge { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 6px; font-family: 'Courier New', monospace; font-weight: 700; font-size: 0.75rem; border: 1px solid #e2e8f0; }

    /* Pagination */
    .pagination-bar { padding: 1.2rem; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 20px; }
    .page-btn { padding: 8px 20px; border: 1px solid var(--border); background: white; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
    .page-btn:hover:not(:disabled) { background: var(--primary); color: white; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .status-bar { padding: 10px 25px; text-align: right; font-size: 0.7rem; color: var(--text-muted); font-weight: 800; background: #f8fafc; }
  </style>
</head>
<body>

<nav>
  <div style="font-weight: 900;"><i class="fas fa-calendar-check"></i> NEXUS v6.5</div>
  <div class="amt-clock" id="clock">00:00:00 AMT</div>
</nav>

<div class="container">
  <div class="dept-grid">
    <div class="dept-card"><div style="color:var(--withdraw)" class="dept-title">出款部汇总</div><div class="chart-box"><canvas id="cWD"></canvas><div class="chart-val" id="tWD">0</div></div></div>
    <div class="dept-card"><div style="color:var(--cs)" class="dept-title">客服部汇总</div><div class="chart-box"><canvas id="cCS"></canvas><div class="chart-val" id="tCS">0</div></div></div>
    <div class="dept-card"><div style="color:var(--finance)" class="dept-title">财务部汇总</div><div class="chart-box"><canvas id="cFN"></canvas><div class="chart-val" id="tFN">0</div></div></div>
    <div class="dept-card"><div style="color:var(--country)" class="dept-title">国家汇总</div><div class="chart-box"><canvas id="cGEO"></canvas><div class="chart-val" id="tGEO">0</div></div></div>
    <div class="dept-card"><div style="color:var(--accent)" class="dept-title">班次汇总</div><div class="chart-box"><canvas id="cSH"></canvas><div class="chart-val" id="tSH">0</div></div></div>
  </div>

  <div class="filter-wrapper">
    <div class="filter-grid">
      <div class="filter-group"><label>Keyword</label><input type="text" id="searchName" placeholder="Search..."></div>
      <div class="filter-group"><label>Shift</label><select id="fShift"></select></div>
      <div class="filter-group"><label>Team (J)</label><select id="fTeam"></select></div>
      <div class="filter-group"><label>Group (B)</label><select id="fGroup"></select></div>
      <div class="filter-group"><label>Country</label><select id="fCountry"></select></div>
      <div class="filter-group"><label>Platform</label><select id="fPlatform"></select></div>
    </div>
  </div>

  <div class="table-container">
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>平台</th><th>组别(B)</th><th>团队(J)</th><th>ID</th><th>姓名</th><th>班次</th><th>入职日期</th><th>国家</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="status-bar" id="statusBar">Syncing...</div>
    <div class="pagination-bar">
      <button class="page-btn" id="prevBtn" onclick="changePage(-1)">PREV</button>
      <span id="pageInfo" style="font-weight: 800; font-size: 0.8rem;">Page 1</span>
      <button class="page-btn" id="nextBtn" onclick="changePage(1)">NEXT</button>
    </div>
  </div>
</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRTWdis5deT7Foc0n9WvjY45n-Yl5oujgHKUKo8yncqAiMfxi42VZEh3OezV3BSozJsY_b9jexKArco/pub?output=csv";
  let db = [], filtered = [], charts = {};
  let currentPage = 1;
  const rowsPerPage = 10; // LOCK 10 DATA PER PAGE

  async function load() {
    try {
      const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
      const t = await r.text();
      db = t.split(/\r?\n/).slice(1).map(l => l.split(',').map(c => c.trim())).filter(d => d[3]);
      initFilters();
      runFilters(); 
      setInterval(() => {
        document.getElementById('clock').innerText = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Yerevan"})).toLocaleTimeString('en-GB') + " AMT";
      }, 1000);
    } catch (e) { console.error(e); }
  }

  function initFilters() {
    const getU = (idx) => [...new Set(db.map(r => r[idx]))].filter(v => v && v !== "-").sort();
    const fill = (id, vals) => {
      const s = document.getElementById(id);
      s.innerHTML = `<option value="">All Records</option>`;
      vals.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
    };
    fill('fPlatform', getU(0));
    fill('fGroup', getU(1));
    fill('fTeam', getU(9));
    fill('fShift', getU(5));
    fill('fCountry', getU(8));
    ['searchName', 'fShift', 'fTeam', 'fGroup', 'fCountry', 'fPlatform'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => { currentPage = 1; runFilters(); });
    });
  }

  function runFilters() {
    const sn = document.getElementById('searchName').value.toLowerCase();
    const sf = document.getElementById('fShift').value;
    const st = document.getElementById('fTeam').value;
    const sg = document.getElementById('fGroup').value;
    const sc = document.getElementById('fCountry').value;
    const sp = document.getElementById('fPlatform').value;

    filtered = db.filter(r => {
      return (r.join(' ').toLowerCase().includes(sn)) &&
             (!sf || r[5] === sf) && (!sg || r[1] === sg) &&
             (!st || r[9] === st) && (!sc || r[8] === sc) && (!sp || r[0] === sp);
    });
    updateUI();
  }

  // DATE FORMATTER: Memaksa DD-MM-YYYY
  function strictDateFormat(val) {
    if (!val || val === "-") return "-";
    let d;
    if (!isNaN(val) && val.length > 4) {
      // Jika format serial Google Sheets (misal 45212)
      d = new Date((val - 25569) * 86400 * 1000);
    } else {
      // Jika format teks (YYYY-MM-DD atau DD/MM/YYYY)
      d = new Date(val.replace(/-/g, '/'));
    }
    if (isNaN(d.getTime())) return val;
    const day = String(d.getDate()).padStart(2, '0');
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const year = d.getFullYear();
    return `${day}-${month}-${year}`;
  }

  function updateUI() {
    syncCharts();
    const tbody = document.getElementById('tbody');
    const start = (currentPage - 1) * rowsPerPage;
    const pageData = filtered.slice(start, start + rowsPerPage);

    tbody.innerHTML = pageData.map(r => {
      const b = r[1]||"", j = r[9]||"";
      let cls = (b.includes('出款') || j.includes('出款') || b.includes('审核转盘')) ? 'tag-wd' : 
                (b.includes('客服') || j.includes('客服')) ? 'tag-cs' : 
                (b.includes('财务') || j.includes('财务')) ? 'tag-fn' : '';
      return `<tr>
        <td><b>${r[0]}</b></td>
        <td><span class="${cls}">${r[1]}</span></td>
        <td>${r[9]}</td>
        <td style="opacity:0.5">#${r[2]}</td>
        <td style="font-weight:800">${r[3]}</td>
        <td>${r[5]}</td>
        <td><span class="date-badge">${strictDateFormat(r[6])}</span></td>
        <td style="color:var(--country)">${r[8]}</td>
      </tr>`;
    }).join('');

    const totalPages = Math.ceil(filtered.length / rowsPerPage) || 1;
    document.getElementById('pageInfo').innerText = `Page ${currentPage} / ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    document.getElementById('statusBar').innerText = `Found: ${filtered.length} Records`;
  }

  function changePage(step) {
    currentPage += step;
    updateUI();
  }

  function syncCharts() {
    let wdO = {}, csO = {}, fnO = {}, geO = {}, shO = {};
    const palette = ["#3b82f6", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6"];
    filtered.forEach(r => {
      const b = r[1]||"", j = r[9]||"";
      if (b.includes('出款') || j.includes('出款')) wdO[b] = (wdO[b]||0)+1;
      else if (b.includes('客服') || j.includes('客服')) csO[b] = (csO[b]||0)+1;
      else if (b.includes('财务') || j.includes('财务')) fnO[b] = (fnO[b]||0)+1;
      if(r[8]) geO[r[8]] = (geO[r[8]]||0)+1;
      if(r[5]) shO[r[5]] = (shO[r[5]]||0)+1;
    });
    const draw = (id, data, tId) => {
      const ctx = document.getElementById(id).getContext('2d');
      if (charts[id]) charts[id].destroy();
      const entries = Object.entries(data);
      charts[id] = new Chart(ctx, {
        type: 'doughnut', data: { datasets:[{data:entries.map(e=>e[1]), backgroundColor:palette, borderWidth:0}] },
        options: { plugins:{legend:{display:false}}, cutout:'75%' }
      });
      document.getElementById(tId).innerText = entries.reduce((a,b)=>a+b[1],0);
    };
    draw('cWD', wdO, 'tWD'); draw('cCS', csO, 'tCS');
    draw('cFN', fnO, 'tFN'); draw('cGEO', geO, 'tGEO');
    draw('cSH', shO, 'tSH');
  }

  load();
</script>
</body>
</html>
